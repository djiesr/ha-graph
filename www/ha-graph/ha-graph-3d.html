    /* ── 3D-specific layout ───────────────────────────────────────────────── */
    #main-split { display: flex; flex: 1; min-height: 0; }
    #graph-container { flex: 1; position: relative; min-width: 0; min-height: 0; }
    #graph-container canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    /* ── Sidebar (3D: inline panel, collapses to width:0) ─────────────────── */
    #sidebar {
      width: 320px; max-width: 40vw; flex-shrink: 0; align-self: stretch;
      background: var(--surface); border-left: 1px solid var(--accent);
      box-shadow: -4px 0 20px var(--shadow);
      overflow-y: auto; padding: 16px; position: relative;
    }
    #sidebar:not(.open) { width:0 !important; min-width:0; padding:0; border:none; overflow:hidden; box-shadow:none; }
    #sidebar.open { width: 320px; max-width: 40vw; }
    /* ── Sliders ──────────────────────────────────────────────────────────── */
    .graph-toolbar-sliders {
      display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap;
      font-size: 12px; color: var(--text-dim);
    }
    .graph-toolbar-sliders label {
      display: inline-flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap;
    }
    .graph-toolbar-sliders input[type="range"] { width: 86px; vertical-align: middle; accent-color: var(--on); }
    /* ── Debug camera panel ───────────────────────────────────────────────── */
    .toolbar-debug-cam { align-self: flex-end; text-align: right; max-width: min(320px, 42vw); }
    .toolbar-debug-cam label { font-size: 11px; color: var(--text-dim); cursor: pointer; user-select: none; }
    #debug-cam-panel {
      display: none; margin: 4px 0 0; padding: 6px 8px;
      max-height: 140px; overflow: auto;
      font-size: 10px; line-height: 1.35;
      font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
      color: var(--text-dim); background: rgba(15,52,96,0.55);
      border: 1px solid var(--accent); border-radius: 6px;
      text-align: left; white-space: pre-wrap; word-break: break-all;
    }
    #debug-cam-panel.visible { display: block; }
  </style>

  <!-- Three.js needs the "three" bare specifier resolved via import map -->
  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js';
import { forceSimulation, forceLink, forceManyBody, forceCenter } from 'https://cdn.jsdelivr.net/npm/d3-force-3d@3.0.5/+esm';

import {
  STORAGE_LAYOUT_3D, EDGE_COLORS,
  t, applyI18n,
  readStoredLayoutRaw, layoutObjectHasKeys, schedulePushLayoutToServer,
  states, graphData,
  entityToNodeId, deviceAggregatedState, entityDomain,
  getDomainColor, liveMode,
  openSidebar, buildDomainFilters, buildLegend,
  registerRenderer, bindCommonUI, initAuthPanel
} from './ha-graph-core.js';

// ── 3D-specific storage keys ──────────────────────────────────────────────────
const STORAGE_3D_SHAPE_SCALE    = 'ha_graph_3d_shape_scale';
const STORAGE_3D_LABEL_PX       = 'ha_graph_3d_label_px';
const STORAGE_3D_LABELS_SHOW_ALL= 'ha_graph_3d_labels_show_all';
const STORAGE_3D_DEBUG_CAM      = 'ha_graph_3d_debug_cam';
const STORAGE_3D_AUTO_ROTATE    = 'ha_graph_3d_auto_rotate';

/** OrbitControls autoRotate speed (lower = slower). */
const AUTO_ROTATE_SPEED = 0.5;
/** Above this node count: labels only on hover by default (CSS2D × 500 nodes = slow browser). */
const LARGE_GRAPH_LABEL_THRESHOLD = 160;

// ── 3D scene state ────────────────────────────────────────────────────────────
const graph3d = {
  renderer: null, scene: null, camera: null, controls: null, simulation: null,
  nodeGroup: null, edgeGroup: null,
  idToMesh: new Map(), idToSimNode: new Map(),
  simNodes: [], simLinks: [],
  rafId: null, raycaster: null, pointerNdc: new THREE.Vector2(),
  edgeGeom: null, edgeLine: null, resizeHandler: null,
  hoveredId: null, layoutSaveTimer: null,
  draggingNodeId: null, dragIsActive: false,
  dragPlane: null, dragPlaneAnchor: null, dragHit: null, dragTmpDir: null,
  dragStartClient: null, suppressNextClick: false,
  pendingSelectNodeId: null, armDragNodeId: null,
  css2dRenderer: null, idToLabel: new Map(),
  shapeSizeFactor: 1, labelFontPx: 11,
  floatingLabel: null, pickRafId: null, lastPickEv: null,
  edgeBoundsStale: true, _floatLabelNodeId: null,
  _safeWheelHandler: null, _wheelZoomUsesSafeFix: false,
  activeAnimations: [],   // { nodeId, type:'flash'|'pulse', t0, duration }
  activeParticles:  []    // { src, tgt, t0, duration, mesh }
};

const _wheelZoomDir = new THREE.Vector3();

// ── Wheel-zoom DPR=0 fix (OrbitControls r160 bug) ────────────────────────────
/** OrbitControls getZoomScale divides by (100 * (devicePixelRatio|0)) → 0 if DPR∈(0,1), zoom broken. */
function wheelZoomThreeJsBroken() {
  const dpr = Number(window.devicePixelRatio);
  return ((Number.isFinite(dpr) ? dpr : 1) | 0) === 0;
}

function onGraphSafeWheel(ev) {
  if (!graph3d.controls || !graph3d.camera || !graph3d.controls.enabled) return;
  if (!graph3d.camera.isPerspectiveCamera) return;
  if (graph3d.pendingSelectNodeId || graph3d.draggingNodeId) return;
  ev.preventDefault();
  const ctl = graph3d.controls, cam = graph3d.camera, tgt = ctl.target;
  _wheelZoomDir.subVectors(cam.position, tgt);
  const dist = _wheelZoomDir.length();
  if (dist < 1e-5) return;
  _wheelZoomDir.divideScalar(dist);
  let deltaMag = Math.abs(ev.deltaY);
  if (ev.deltaMode === 1) deltaMag *= 16;
  else if (ev.deltaMode === 2) deltaMag *= 100;
  const rawDpr = Number(window.devicePixelRatio);
  const safeDpr = Math.max(0.25, Math.min(4, (Number.isFinite(rawDpr) && rawDpr > 0) ? rawDpr : 1));
  const normalized = Math.min(12, deltaMag / (100 * safeDpr));
  let dollyScale = Math.pow(0.95, ctl.zoomSpeed * normalized);
  dollyScale = THREE.MathUtils.clamp(dollyScale, 0.04, 0.9995);
  const newDist = THREE.MathUtils.clamp(
    ev.deltaY > 0 ? dist / dollyScale : dist * dollyScale,
    ctl.minDistance, ctl.maxDistance
  );
  cam.position.copy(tgt).addScaledVector(_wheelZoomDir, newDist);
  ctl.update();
}

function detachGraphSafeWheel() {
  const canvas = graph3d.renderer?.domElement;
  if (canvas && graph3d._safeWheelHandler) canvas.removeEventListener('wheel', graph3d._safeWheelHandler);
  graph3d._safeWheelHandler = null;
  graph3d._wheelZoomUsesSafeFix = false;
}

function attachGraphSafeWheelIfNeeded() {
  detachGraphSafeWheel();
  if (!graph3d.renderer || !graph3d.controls) return;
  if (!wheelZoomThreeJsBroken()) { graph3d.controls.enableZoom = true; return; }
  graph3d.controls.enableZoom = false;
  graph3d._wheelZoomUsesSafeFix = true;
  graph3d._safeWheelHandler = onGraphSafeWheel;
  graph3d.renderer.domElement.addEventListener('wheel', graph3d._safeWheelHandler, { passive: false });
}

// ── Node colour (on/off/unavailable → THREE.Color) ────────────────────────────
function nodeColor(state) {
  if (state === 'unavailable') return new THREE.Color(0xe94560);
  if (state === 'on')          return new THREE.Color(0xa8e6cf);
  return new THREE.Color(0x6c757d);
}

// Priority order for device node domain selection
const DOMAIN_PRIORITY_3D = ['light','switch','cover','lock','climate','media_player','fan','binary_sensor','input_boolean','automation','script','scene','sensor'];

function _bestDeviceColor3d(entityIds) {
  let bestPrio = Infinity, bestEid = null;
  for (const eid of (entityIds || [])) {
    const s = states[eid];
    if (!s || s.state === 'unavailable') continue;
    const dom = entityDomain(eid);
    const prio = DOMAIN_PRIORITY_3D.indexOf(dom);
    if (s.state === 'on' && prio >= 0 && prio < bestPrio) { bestPrio = prio; bestEid = eid; }
  }
  if (bestEid) return getDomainColor(entityDomain(bestEid), 'on', states[bestEid]?.attributes);
  let fallbackEid = null, fallbackPrio = Infinity;
  for (const eid of (entityIds || [])) {
    const prio = DOMAIN_PRIORITY_3D.indexOf(entityDomain(eid));
    if (prio >= 0 && prio < fallbackPrio) { fallbackPrio = prio; fallbackEid = eid; }
  }
  if (fallbackEid) {
    const s = states[fallbackEid];
    return getDomainColor(entityDomain(fallbackEid), s?.state ?? 'off', s?.attributes);
  }
  return '#455a64';
}

/** Returns a THREE.Color using getDomainColor when liveMode is on. */
function nodeColorLive(nodeId, state) {
  if (!liveMode) return nodeColor(state);
  const node = graphData.nodes.find(n => n.id === nodeId);
  if (!node) return new THREE.Color(getDomainColor('device', state));
  if (node.domain === 'device') return new THREE.Color(_bestDeviceColor3d(node.entityIds));
  const s = states[nodeId];
  return new THREE.Color(getDomainColor(node.domain, state, s?.attributes || {}));
}

// ── Dispose ───────────────────────────────────────────────────────────────────
function disposeGraph3d() {
  if (graph3d.rafId)          { cancelAnimationFrame(graph3d.rafId); graph3d.rafId = null; }
  if (graph3d.layoutSaveTimer){ clearTimeout(graph3d.layoutSaveTimer); graph3d.layoutSaveTimer = null; }
  if (graph3d.simulation)     { graph3d.simulation.stop(); graph3d.simulation = null; }
  if (graph3d.resizeHandler)  { window.removeEventListener('resize', graph3d.resizeHandler); graph3d.resizeHandler = null; }
  const canvas = graph3d.renderer?.domElement;
  if (canvas) {
    detachGraphSafeWheel();
    canvas.removeEventListener('click', onCanvasClick);
    canvas.removeEventListener('pointermove', onCanvasPointerMove);
    canvas.removeEventListener('pointerdown', onCanvasPointerDown, true);
    canvas.removeEventListener('pointerup', onCanvasPointerUp);
    canvas.removeEventListener('pointercancel', onCanvasPointerUp);
  }
  const container = document.getElementById('graph-container');
  if (container) container.innerHTML = '';
  if (graph3d.controls) { graph3d.controls.enabled = true; graph3d.controls.dispose(); }
  if (graph3d.renderer) graph3d.renderer.dispose();
  if (graph3d.edgeGeom) graph3d.edgeGeom.dispose();
  graph3d.renderer = graph3d.scene = graph3d.camera = graph3d.controls = null;
  graph3d.nodeGroup = graph3d.edgeGroup = graph3d.edgeLine = graph3d.edgeGeom = null;
  graph3d.idToMesh.clear(); graph3d.idToSimNode.clear();
  graph3d.simNodes = []; graph3d.simLinks = [];
  graph3d.raycaster = graph3d.hoveredId = null;
  graph3d._edgePairs = null;
  graph3d.draggingNodeId = null; graph3d.dragIsActive = false;
  graph3d.dragStartClient = null; graph3d.suppressNextClick = false;
  graph3d.pendingSelectNodeId = graph3d.armDragNodeId = null;
  graph3d.css2dRenderer = null; graph3d.idToLabel.clear();
  if (graph3d.floatingLabel) {
    try { if (graph3d.floatingLabel.parent) graph3d.floatingLabel.parent.remove(graph3d.floatingLabel); } catch (e) {}
    graph3d.floatingLabel = null;
  }
  if (graph3d.pickRafId) { cancelAnimationFrame(graph3d.pickRafId); graph3d.pickRafId = null; }
  graph3d.lastPickEv = null; graph3d.edgeBoundsStale = true;
  graph3d._frameIdx = 0; graph3d._simEdgeTick = 0; graph3d._floatLabelNodeId = null;
  // Clean up animation particles
  graph3d.activeParticles.forEach(p => { try { if (p.mesh.parent) p.mesh.parent.remove(p.mesh); p.mesh.geometry.dispose(); p.mesh.material.dispose(); } catch(e) {} });
  graph3d.activeAnimations = [];
  graph3d.activeParticles = [];
}

// ── Node mesh factory ─────────────────────────────────────────────────────────
function createNodeMesh(gd, deg) {
  const base = 5 + Math.min(10, Math.sqrt((deg || 0) + 1) * 2.2);
  const domain = gd ? gd.domain : 'device';
  const mat = new THREE.MeshStandardMaterial({
    color: nodeColorLive(gd ? gd.id : '', gd ? gd.state : 'off').clone(),
    metalness: 0.28, roughness: 0.52,
    emissive: new THREE.Color(0x000000), emissiveIntensity: 0.12
  });
  const lowPoly = graphData.nodes.length > LARGE_GRAPH_LABEL_THRESHOLD;
  let geom;
  switch (domain) {
    case 'device':
      /* Device aggregate: sphere */
      geom = lowPoly ? new THREE.SphereGeometry(base, 12, 10) : new THREE.SphereGeometry(base, 22, 18); break;
    case 'automation':
      /* Automation: cube */
      geom = new THREE.BoxGeometry(base*1.38, base*1.38, base*1.38); break;
    case 'script':
      /* Script: flat box (distinct from automation cube) */
      geom = new THREE.BoxGeometry(base*1.22, base*0.62, base*0.92); break;
    case 'scene':
      /* Scene: flattened octahedron (diamond) */
      geom = new THREE.OctahedronGeometry(base*1.18, 0); geom.scale(1, 0.46, 1); break;
    case 'group':
      /* Group: hexagonal prism */
      geom = new THREE.CylinderGeometry(base*0.98, base*0.98, base*1.18, 6); break;
    case 'zone':
      /* Zone: flat puck */
      geom = lowPoly ? new THREE.CylinderGeometry(base*1.12, base*1.12, base*0.38, 12)
                     : new THREE.CylinderGeometry(base*1.12, base*1.12, base*0.38, 20); break;
    default:
      /* Orphan entities (sensor, light, switch, …): small sphere */
      geom = lowPoly ? new THREE.SphereGeometry(base*0.98, 12, 10) : new THREE.SphereGeometry(base*0.98, 18, 14);
  }
  return new THREE.Mesh(geom, mat);
}

// ── CSS2D label management ────────────────────────────────────────────────────
function makeLabelDiv(text) {
  const div = document.createElement('div');
  div.className = 'graph-node-label';
  div.textContent = text;
  div.style.cssText = `
    font-family:'Segoe UI',system-ui,sans-serif; font-weight:500; font-size:${graph3d.labelFontPx}px;
    color:#e8e8e8; text-shadow:0 1px 2px #000,0 0 10px rgba(26,26,46,0.95);
    max-width:min(220px,38vw); text-align:center; line-height:1.2;
    word-break:break-word; pointer-events:none; opacity:1;
  `;
  return div;
}

function attachNodeLabel(mesh, nodeId, labelText) {
  if (!mesh?.geometry) return;
  mesh.geometry.computeBoundingSphere();
  const r = (mesh.geometry.boundingSphere?.radius > 0 ? mesh.geometry.boundingSphere.radius : 12);
  const label = new CSS2DObject(makeLabelDiv(labelText?.trim() || nodeId));
  label.center.set(0.5, 1);
  label.position.set(0, -r - Math.max(5, r*0.14), 0);
  mesh.add(label);
  graph3d.idToLabel.set(nodeId, label);
}

function shouldAttachAllLabels() {
  return !!(document.getElementById('labels-show-all')?.checked);
}

function stripAllNodeLabels() {
  graph3d.idToLabel.forEach(lbl => { if (lbl.parent) lbl.parent.remove(lbl); });
  graph3d.idToLabel.clear();
}

function ensureFloatingHoverLabel() {
  if (graph3d.floatingLabel) return;
  const label = new CSS2DObject(makeLabelDiv(''));
  label.center.set(0.5, 1);
  graph3d.floatingLabel = label;
}

function syncFloatingLabelToHover() {
  if (shouldAttachAllLabels()) return;
  const fl = graph3d.floatingLabel;
  if (!fl) return;
  const id = graph3d.hoveredId;
  if (!id) {
    if (fl.parent) fl.parent.remove(fl);
    graph3d._floatLabelNodeId = null;
    return;
  }
  const mesh = graph3d.idToMesh.get(id);
  if (!mesh?.visible) {
    if (fl.parent) fl.parent.remove(fl);
    graph3d._floatLabelNodeId = null;
    return;
  }
  const sn = graph3d.idToSimNode.get(id);
  fl.element.textContent = sn?.label?.trim() || id;
  fl.element.style.fontSize = graph3d.labelFontPx + 'px';
  if (fl.parent !== mesh || graph3d._floatLabelNodeId !== id) {
    mesh.geometry.computeBoundingSphere();
    const r = (mesh.geometry.boundingSphere?.radius > 0 ? mesh.geometry.boundingSphere.radius : 12);
    fl.position.set(0, -r - Math.max(5, r*0.14), 0);
  }
  if (fl.parent !== mesh) { if (fl.parent) fl.parent.remove(fl); mesh.add(fl); }
  graph3d._floatLabelNodeId = id;
  const q = document.getElementById('search').value.trim().toLowerCase();
  const lab = sn?.label || '';
  fl.element.style.opacity = (!q || id.toLowerCase().includes(q) || lab.toLowerCase().includes(q)) ? '1' : '0.3';
}

function applyLabelFontSizes() {
  const px = graph3d.labelFontPx > 0 ? graph3d.labelFontPx : 11;
  graph3d.idToLabel.forEach(lbl => { if (lbl.element) lbl.element.style.fontSize = px + 'px'; });
  if (graph3d.floatingLabel?.element) graph3d.floatingLabel.element.style.fontSize = px + 'px';
}

function reapplyLabelMode() {
  if (!graph3d.nodeGroup) return;
  stripAllNodeLabels();
  if (graph3d.floatingLabel?.parent) graph3d.floatingLabel.parent.remove(graph3d.floatingLabel);
  if (shouldAttachAllLabels()) {
    graphData.nodes.forEach(gd => { const m = graph3d.idToMesh.get(gd.id); if (m) attachNodeLabel(m, gd.id, gd.label); });
  } else {
    ensureFloatingHoverLabel();
    syncFloatingLabelToHover();
  }
  applyLabelFontSizes();
  refreshSearchDimming();
}

// ── Hover picking ─────────────────────────────────────────────────────────────
function runHoverPickFromStoredEvent() {
  graph3d.pickRafId = null;
  const ev = graph3d.lastPickEv;
  if (!ev || graph3d.pendingSelectNodeId || graph3d.draggingNodeId) return;
  const id = pickNodeFromEvent(ev);
  if (id !== graph3d.hoveredId) {
    graph3d.hoveredId = id;
    if (id) highlightNeighbors3d(id); else resetNodeEmissiveAndOrphans();
    if (!shouldAttachAllLabels()) syncFloatingLabelToHover();
  }
  if (graph3d.renderer?.domElement) graph3d.renderer.domElement.style.cursor = id ? 'grab' : '';
}

function scheduleHoverPick(ev) {
  graph3d.lastPickEv = ev;
  if (graph3d.pickRafId != null) return;
  graph3d.pickRafId = requestAnimationFrame(() => runHoverPickFromStoredEvent());
}

// ── Mesh state ────────────────────────────────────────────────────────────────
function setMeshMaterialState(mesh, nodeId, state) {
  if (mesh?.material) mesh.material.color.copy(nodeColorLive(nodeId, state));
}

function neighborIdsOf(nodeId) {
  const s = new Set([nodeId]);
  graphData.edges.forEach(e => { if (e.source === nodeId) s.add(e.target); if (e.target === nodeId) s.add(e.source); });
  return s;
}

// ── Sim / edge update ─────────────────────────────────────────────────────────
function layoutSimulationBusy() {
  const s = graph3d.simulation;
  return !!(s && typeof s.alpha === 'function' && s.alpha() > 0.16);
}

function syncMeshesFromSim() {
  graph3d.simNodes.forEach(n => { const m = graph3d.idToMesh.get(n.id); if (m) m.position.set(n.x||0, n.y||0, n.z||0); });
  const relax = layoutSimulationBusy(), dragging = graph3d.draggingNodeId != null;
  if (dragging || !relax) { updateEdgeLinePositions(); return; }
  const nN = graph3d.simNodes.length;
  graph3d._simEdgeTick = (graph3d._simEdgeTick||0) + 1;
  const edgeEvery = nN > 280 ? 3 : (nN > 160 ? 2 : 1);
  if (graph3d._simEdgeTick % edgeEvery === 0) updateEdgeLinePositions();
}

function updateEdgeLinePositions() {
  if (!graph3d.edgeGeom || !graph3d._edgePairs) return;
  const posAttr = graph3d.edgeGeom.attributes.position, arr = posAttr.array;
  let i = 0;
  graph3d._edgePairs.forEach(ep => {
    if (ep.hidden) { arr[i++]=arr[i++]=arr[i++]=arr[i++]=arr[i++]=arr[i++]=0; return; }
    const a = graph3d.idToSimNode.get(ep.src), b = graph3d.idToSimNode.get(ep.tgt);
    if (!a || !b) { arr[i++]=arr[i++]=arr[i++]=arr[i++]=arr[i++]=arr[i++]=0; return; }
    arr[i++]=a.x??0; arr[i++]=a.y??0; arr[i++]=a.z??0;
    arr[i++]=b.x??0; arr[i++]=b.y??0; arr[i++]=b.z??0;
  });
  posAttr.needsUpdate = true;
  graph3d.edgeBoundsStale = true;
}

function refreshEdgeBoundingSphereIfNeeded() {
  if (graph3d.edgeGeom && graph3d.edgeBoundsStale) { graph3d.edgeGeom.computeBoundingSphere(); graph3d.edgeBoundsStale = false; }
}

function rebuildEdgeIndex() {
  graph3d._edgePairs = graphData.edges.map(e => ({ src:e.source, tgt:e.target, type:e.type||'member', hidden:false }));
  const segCount = graph3d._edgePairs.length;
  const positions = new Float32Array(segCount * 6);
  graph3d.edgeGeom = new THREE.BufferGeometry();
  graph3d.edgeGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const colors = new Float32Array(segCount * 6), ctmp = new THREE.Color();
  let ci = 0;
  graph3d._edgePairs.forEach(ep => {
    ctmp.set(EDGE_COLORS[ep.type] || '#a8e6cf');
    colors[ci++]=ctmp.r; colors[ci++]=ctmp.g; colors[ci++]=ctmp.b;
    colors[ci++]=ctmp.r; colors[ci++]=ctmp.g; colors[ci++]=ctmp.b;
  });
  graph3d.edgeGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  if (graph3d.edgeLine) { graph3d.edgeGroup.remove(graph3d.edgeLine); graph3d.edgeLine.geometry.dispose(); graph3d.edgeLine.material.dispose(); }
  graph3d.edgeLine = new THREE.LineSegments(
    graph3d.edgeGeom,
    new THREE.LineBasicMaterial({ vertexColors:true, transparent:true, opacity:0.5 })
  );
  graph3d.edgeLine.frustumCulled = false;
  graph3d.edgeGroup.add(graph3d.edgeLine);
  graph3d.edgeGeom.computeBoundingSphere();
  graph3d.edgeBoundsStale = false;
}

function scheduleLayoutSave() {
  if (graph3d.layoutSaveTimer) clearTimeout(graph3d.layoutSaveTimer);
  graph3d.layoutSaveTimer = setTimeout(() => { graph3d.layoutSaveTimer = null; saveLayoutToStorage(); }, 400);
}

function startForceSimulation() {
  if (graph3d.simulation) graph3d.simulation.stop();
  const n = graph3d.simNodes.length;
  const large = n > LARGE_GRAPH_LABEL_THRESHOLD;
  graph3d._simEdgeTick = 0;
  graph3d.simulation = forceSimulation(graph3d.simNodes, 3)
    .force('link', forceLink(graphData.edges.map(e => ({ source:e.source, target:e.target }))).id(d => d.id).distance(large?72:100).strength(large?0.5:0.62))
    .force('charge', forceManyBody().strength(large?-95:-240).theta(0.88))
    .force('center', forceCenter(0, 0, 0))
    .velocityDecay(large?0.52:0.42)
    .alphaMin(large?0.035:0.02)
    .alphaDecay(large?0.055:0.028)
    .on('tick', () => syncMeshesFromSim())
    .on('end', () => {
      updateEdgeLinePositions();
      refreshEdgeBoundingSphereIfNeeded();
      scheduleLayoutSave();
      applyOrbitCameraLimits();
    });
}

// ── Debug camera panel ────────────────────────────────────────────────────────
function updateDebugCamPanel() {
  const panel = document.getElementById('debug-cam-panel');
  const toggle = document.getElementById('debug-cam-toggle');
  if (!panel || !toggle) return;
  if (!toggle.checked) { panel.classList.remove('visible'); panel.textContent = ''; return; }
  panel.classList.add('visible');
  const cam = graph3d.camera, ctl = graph3d.controls;
  if (!cam || !ctl) { panel.textContent = '—'; return; }
  const p = cam.position, tg = ctl.target;
  const dist = Math.sqrt((p.x-tg.x)**2 + (p.y-tg.y)**2 + (p.z-tg.z)**2);
  const span = ctl.maxDistance - ctl.minDistance;
  const zoomPct = span > 1e-6 ? ((dist - ctl.minDistance) / span) * 100 : 0;
  let polar = '—', azim = '—';
  try {
    if (typeof ctl.getPolarAngle === 'function') polar = (ctl.getPolarAngle() * 180/Math.PI).toFixed(1) + '°';
    if (typeof ctl.getAzimuthalAngle === 'function') azim = (ctl.getAzimuthalAngle() * 180/Math.PI).toFixed(1) + '°';
  } catch (e) {}
  const gb = getVisibleGraphBounds();
  let visN = 0;
  graph3d.idToMesh.forEach(m => { if (m.visible) visN++; });
  const dpr = window.devicePixelRatio;
  panel.textContent = [
    `dist ${dist.toFixed(1)}  (min ${ctl.minDistance.toFixed(1)} … max ${ctl.maxDistance.toFixed(1)})`,
    `zoom ${zoomPct.toFixed(1)}% of range  |  near/far ${cam.near.toFixed(2)} / ${cam.far.toFixed(0)}`,
    `cam  ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`,
    `tgt  ${tg.x.toFixed(1)}, ${tg.y.toFixed(1)}, ${tg.z.toFixed(1)}`,
    `polar ${polar}  azim ${azim}  fov ${cam.fov}°`,
    `panSp ${ctl.panSpeed}  zoomSp ${ctl.zoomSpeed}  damp ${ctl.dampingFactor}  spin ${ctl.autoRotate}@${ctl.autoRotateSpeed}`,
    `hover ${graph3d.hoveredId||'—'}  |  vis ${visN}/${graphData.nodes.length}  r≈${gb?gb.radius.toFixed(0):'—'}`,
    `wheel ${graph3d._wheelZoomUsesSafeFix?'safe (DPR|0=0 fix)':'three.js'}  |  dpr ${dpr}  (|0)=${Number(dpr)|0}`,
    `edges ${graphData.edges.length}`
  ].join('\n');
}

// ── Active animations (flash / pulse) ────────────────────────────────────────
function _processActiveAnimations() {
  const now = performance.now();
  graph3d.activeAnimations = graph3d.activeAnimations.filter(anim => {
    const mesh = graph3d.idToMesh.get(anim.nodeId);
    if (!mesh) return false;
    const elapsed = now - anim.t0;
    const progress = Math.min(1, elapsed / anim.duration);
    if (anim.type === 'flash') {
      // 0→0.3: white flash; 0.3→1: fade back to original colour
      const phase = progress < 0.3 ? progress / 0.3 : (progress - 0.3) / 0.7;
      if (progress < 0.3) {
        mesh.material.emissive.setHex(0xffffff);
        mesh.material.emissiveIntensity = phase * 0.9;
      } else {
        mesh.material.emissive.setHex(0x000000);
        mesh.material.emissiveIntensity = (1 - phase) * 0.9;
      }
    }
    if (anim.type === 'pulse') {
      // 0→0.5: grow; 0.5→1: shrink back
      const s = anim.baseScale * (1 + 0.45 * Math.sin(Math.PI * progress));
      mesh.scale.setScalar(s * (graph3d.shapeSizeFactor || 1));
    }
    if (progress >= 1) {
      // Restore emissive state after animation ends
      if (anim.type === 'flash') {
        mesh.material.emissive.setHex(0x000000);
        mesh.material.emissiveIntensity = 0.12;
      }
      if (anim.type === 'pulse') {
        mesh.scale.setScalar(anim.baseScale * (graph3d.shapeSizeFactor || 1));
      }
      return false;
    }
    return true;
  });
}

// ── Active particles (edge propagation) ──────────────────────────────────────
function _processActiveParticles() {
  const now = performance.now();
  graph3d.activeParticles = graph3d.activeParticles.filter(p => {
    const elapsed = now - p.t0;
    const progress = Math.min(1, elapsed / p.duration);
    const a = graph3d.idToSimNode.get(p.src);
    const b = graph3d.idToSimNode.get(p.tgt);
    if (a && b) {
      p.mesh.position.set(
        a.x + (b.x - a.x) * progress,
        a.y + (b.y - a.y) * progress,
        a.z + (b.z - a.z) * progress
      );
      p.mesh.material.opacity = progress < 0.15 ? progress / 0.15 : progress > 0.85 ? (1 - progress) / 0.15 : 1;
    }
    if (progress >= 1) {
      if (p.mesh.parent) p.mesh.parent.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      return false;
    }
    return true;
  });
}

// ── Render loop ───────────────────────────────────────────────────────────────
function animateGraph3dLoop() {
  graph3d.rafId = requestAnimationFrame(animateGraph3dLoop);
  graph3d._frameIdx = (graph3d._frameIdx||0) + 1;
  if (graph3d.controls) graph3d.controls.update();
  if (graph3d.activeAnimations.length) _processActiveAnimations();
  if (graph3d.activeParticles.length)  _processActiveParticles();
  if (document.getElementById('debug-cam-toggle')?.checked && (graph3d._frameIdx & 1) === 0) updateDebugCamPanel();
  if (graph3d.renderer && graph3d.scene && graph3d.camera) graph3d.renderer.render(graph3d.scene, graph3d.camera);
  if (graph3d.css2dRenderer && graph3d.scene && graph3d.camera) {
    const nLab = graph3d.idToLabel.size + (graph3d.floatingLabel?.parent ? 1 : 0);
    if (!(nLab > 90 && (graph3d._frameIdx % 2 === 0))) graph3d.css2dRenderer.render(graph3d.scene, graph3d.camera);
  }
}

// ── Camera / bounds ───────────────────────────────────────────────────────────
function onGraphResize() {
  const container = document.getElementById('graph-container');
  if (!graph3d.renderer || !graph3d.camera || !container) return;
  const w = Math.max(container.clientWidth, 100), h = Math.max(container.clientHeight, 100);
  graph3d.camera.aspect = w / h;
  graph3d.camera.updateProjectionMatrix();
  graph3d.renderer.setSize(w, h);
  if (graph3d.css2dRenderer) graph3d.css2dRenderer.setSize(w, h);
}

function getVisibleGraphBounds() {
  const box = new THREE.Box3();
  graph3d.idToMesh.forEach(mesh => { if (mesh.visible) box.expandByPoint(mesh.position); });
  if (box.isEmpty()) return null;
  const sphere = new THREE.Sphere();
  box.getBoundingSphere(sphere);
  let r = sphere.radius;
  if (!Number.isFinite(r) || r <= 0) r = 80;
  r = Math.max(r, 45);
  return { center: sphere.center.clone(), radius: r };
}

/**
 * Set OrbitControls distance limits from the visible graph bounds.
 *
 * far cap: 850000  → z-buffer precision floor (WebGL clips geometry beyond far)
 * far min: 48000   → minimum so the whole graph fits even before force layout finishes
 */
function applyOrbitCameraLimits(bounds) {
  if (!graph3d.camera || !graph3d.controls) return;
  const b = bounds || getVisibleGraphBounds();
  if (!b) return;
  const r = Math.max(b.radius, 40), n = graphData.nodes.length;
  const minD = Math.max(5, r * 0.01);
  const maxDDesired = Math.max(minD * 18, r * 40 + 16000);
  const far = Math.min(850000, Math.max(48000, maxDDesired + r + 35000));
  const maxD = Math.max(minD * 2, Math.min(maxDDesired, far - r - 8000));
  graph3d.camera.near = Math.max(0.15, Math.min(4, r * 0.00035));
  graph3d.camera.far = far;
  graph3d.camera.updateProjectionMatrix();
  graph3d.controls.minDistance = minD;
  graph3d.controls.maxDistance = maxD;
  graph3d.controls.zoomSpeed = n > LARGE_GRAPH_LABEL_THRESHOLD ? 0.17 : (n > 80 ? 0.36 : 0.58);
  graph3d.controls.panSpeed  = n > LARGE_GRAPH_LABEL_THRESHOLD ? 3.4  : (n > 80 ? 2.6  : 2);
}

function syncAutoRotateFromUI() {
  const ar = document.getElementById('auto-rotate');
  if (!graph3d.controls || !ar) return;
  graph3d.controls.autoRotateSpeed = AUTO_ROTATE_SPEED;
  graph3d.controls.autoRotate = !!ar.checked;
}

function centerCameraOnGraph() {
  if (!graph3d.camera || !graph3d.controls || !graph3d.idToMesh.size) return;
  const b = getVisibleGraphBounds();
  if (!b) return;
  applyOrbitCameraLimits(b);
  const { center, radius: r } = b;
  const dist = THREE.MathUtils.clamp(r * 1.58, graph3d.controls.minDistance * 1.35, graph3d.controls.maxDistance * 0.92);
  graph3d.controls.target.copy(center);
  graph3d.camera.position.set(center.x + dist*0.85, center.y + dist*0.65, center.z + dist*0.9);
  graph3d.controls.update();
}

// ── Pointer picking ───────────────────────────────────────────────────────────
function pickNodeFromEvent(ev) {
  if (!graph3d.raycaster || !graph3d.camera || !graph3d.renderer) return null;
  const rect = graph3d.renderer.domElement.getBoundingClientRect();
  graph3d.pointerNdc.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  graph3d.pointerNdc.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
  graph3d.raycaster.setFromCamera(graph3d.pointerNdc, graph3d.camera);
  const hits = graph3d.raycaster.intersectObjects(graph3d.nodeGroup.children, false).filter(h => h.object.visible);
  return hits.length ? hits[0].object.userData.nodeId : null;
}

const DRAG_THRESHOLD_PX = 5;

function beginNodeDragGesture(ev, id) {
  ev.stopPropagation();
  if (graph3d.controls) graph3d.controls.enabled = false;
  graph3d.pendingSelectNodeId = null;
  graph3d.draggingNodeId = id; graph3d.dragIsActive = false;
  graph3d.dragStartClient = { x: ev.clientX, y: ev.clientY };
  try { ev.currentTarget.setPointerCapture(ev.pointerId); } catch (err) {}
  ev.currentTarget.style.cursor = 'grabbing';
}

function applyArmedNodeEmissiveOverlay() {
  const armed = graph3d.armDragNodeId;
  if (!armed) return;
  const mesh = graph3d.idToMesh.get(armed);
  if (!mesh?.visible || !mesh.material?.emissive) return;
  mesh.material.emissive.setHex(0x3d8b6e);
  mesh.material.emissiveIntensity = 0.44;
}

function refreshEmissiveAfterArmChange() {
  if (graph3d.hoveredId) highlightNeighbors3d(graph3d.hoveredId); else resetNodeEmissiveAndOrphans();
}

function ensureDragPlanes() {
  if (!graph3d.dragPlane) {
    graph3d.dragPlane = new THREE.Plane();
    graph3d.dragPlaneAnchor = new THREE.Vector3();
    graph3d.dragHit = new THREE.Vector3();
    graph3d.dragTmpDir = new THREE.Vector3();
  }
}

function onCanvasPointerDown(ev) {
  if (ev.button !== 0 || !graph3d.raycaster || !graph3d.nodeGroup) return;
  const id = pickNodeFromEvent(ev);
  if (!id) { graph3d.armDragNodeId = null; refreshEmissiveAfterArmChange(); return; }
  /* First click on a node = arm it; second click = drag. Dragging on empty = camera. */
  if (graph3d.armDragNodeId === id) { beginNodeDragGesture(ev, id); return; }
  ev.stopPropagation();
  if (graph3d.controls) graph3d.controls.enabled = false;
  graph3d.pendingSelectNodeId = id; graph3d.draggingNodeId = null; graph3d.dragIsActive = false;
  graph3d.dragStartClient = { x: ev.clientX, y: ev.clientY };
  try { ev.currentTarget.setPointerCapture(ev.pointerId); } catch (err) {}
  ev.currentTarget.style.cursor = 'pointer';
}

function onCanvasPointerUp(ev) {
  const el = graph3d.renderer?.domElement;
  if (graph3d.pendingSelectNodeId) {
    const pid = graph3d.pendingSelectNodeId;
    graph3d.pendingSelectNodeId = null;
    if (el) { try { if (el.hasPointerCapture(ev.pointerId)) el.releasePointerCapture(ev.pointerId); } catch (e) {} el.style.cursor = ''; }
    if (graph3d.controls) graph3d.controls.enabled = true;
    graph3d.armDragNodeId = pid;
    refreshEmissiveAfterArmChange();
    return;
  }
  if (!graph3d.draggingNodeId) return;
  if (el) { try { if (el.hasPointerCapture(ev.pointerId)) el.releasePointerCapture(ev.pointerId); } catch (e) {} el.style.cursor = ''; }
  const n = graph3d.idToSimNode.get(graph3d.draggingNodeId);
  if (n) { n.fx = n.fy = n.fz = null; n.vx = n.vy = n.vz = 0; }
  if (graph3d.dragIsActive) {
    graph3d.suppressNextClick = true;
    if (graph3d.simulation) graph3d.simulation.alphaTarget(0);
    scheduleLayoutSave();
  }
  if (graph3d.controls) graph3d.controls.enabled = true;
  graph3d.draggingNodeId = null; graph3d.dragIsActive = false;
  updateEdgeLinePositions();
  refreshEdgeBoundingSphereIfNeeded();
}

function resetNodeEmissiveAndOrphans() {
  const showOrphans = document.getElementById('orphans')?.checked;
  const withEdges = new Set();
  graphData.edges.forEach(e => { withEdges.add(e.source); withEdges.add(e.target); });
  graph3d.idToMesh.forEach((mesh, id) => {
    if (!mesh.material?.emissive) return;
    mesh.material.emissive.setHex(0x000000);
    mesh.material.emissiveIntensity = 0.12;
    if (showOrphans && !withEdges.has(id) && mesh.visible) {
      mesh.material.emissive.setHex(0xff9a8b); mesh.material.emissiveIntensity = 0.38;
    }
  });
  applyArmedNodeEmissiveOverlay();
}

function highlightNeighbors3d(nodeId) {
  if (!nodeId) { resetNodeEmissiveAndOrphans(); return; }
  const nb = neighborIdsOf(nodeId);
  graph3d.idToMesh.forEach((mesh, id) => {
    if (!mesh.material?.emissive) return;
    if (nb.has(id)) { mesh.material.emissive.setHex(0xffecd2); mesh.material.emissiveIntensity = 0.45; }
    else { mesh.material.emissive.setHex(0x000000); mesh.material.emissiveIntensity = 0.1; }
  });
  applyArmedNodeEmissiveOverlay();
}

function applyGraphVisualFilters() {
  const checked = new Set(Array.from(document.querySelectorAll('.domain-filter:checked')).map(c => c.dataset.domain));
  const showOrphans = document.getElementById('orphans')?.checked;
  const withEdges = new Set();
  graphData.edges.forEach(e => { withEdges.add(e.source); withEdges.add(e.target); });
  graph3d.idToMesh.forEach((mesh, id) => {
    const dom = mesh.userData.domain;
    mesh.visible = checked.has(dom);
    mesh.userData.isOrphan = !!(showOrphans && !withEdges.has(id) && mesh.visible);
  });
  if (graph3d._edgePairs) {
    graph3d._edgePairs.forEach(ep => { ep.hidden = !graph3d.idToMesh.get(ep.src)?.visible || !graph3d.idToMesh.get(ep.tgt)?.visible; });
  }
  updateEdgeLinePositions();
  refreshSearchDimming();
  if (graph3d.hoveredId) highlightNeighbors3d(graph3d.hoveredId); else resetNodeEmissiveAndOrphans();
  applyOrbitCameraLimits();
}

function refreshSearchDimming() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const shapeF = graph3d.shapeSizeFactor > 0 ? graph3d.shapeSizeFactor : 1;
  graph3d.idToMesh.forEach((mesh, id) => {
    if (!mesh.material) return;
    if (!mesh.userData.baseScale) mesh.userData.baseScale = 1;
    const base = mesh.userData.baseScale;
    let mult = 1, opacity = 1;
    if (!q) {
      mesh.material.transparent = false;
    } else {
      const lab = graph3d.idToSimNode.get(id)?.label || '';
      const match = id.toLowerCase().includes(q) || lab.toLowerCase().includes(q);
      mult = match ? 1.18 : 0.72; opacity = match ? 1 : 0.3;
      mesh.material.transparent = true;
    }
    mesh.scale.setScalar(base * shapeF * mult);
    mesh.material.opacity = opacity;
    const cssLbl = graph3d.idToLabel.get(id);
    if (cssLbl?.element) cssLbl.element.style.opacity = String(opacity);
  });
  if (!shouldAttachAllLabels()) syncFloatingLabelToHover();
}

function onCanvasClick(ev) {
  if (graph3d.suppressNextClick) { graph3d.suppressNextClick = false; return; }
  const id = pickNodeFromEvent(ev);
  if (id) openSidebar(id);
}

function onCanvasPointerMove(ev) {
  if (graph3d.pendingSelectNodeId) return;
  if (graph3d.draggingNodeId) {
    ensureDragPlanes();
    const sc = graph3d.dragStartClient;
    const dx = ev.clientX - sc.x, dy = ev.clientY - sc.y;
    if (!graph3d.dragIsActive && (dx*dx + dy*dy) >= DRAG_THRESHOLD_PX*DRAG_THRESHOLD_PX) {
      graph3d.dragIsActive = true;
      const mesh = graph3d.idToMesh.get(graph3d.draggingNodeId);
      const n = graph3d.idToSimNode.get(graph3d.draggingNodeId);
      if (mesh && n) {
        graph3d.dragPlaneAnchor.copy(mesh.position);
        graph3d.camera.getWorldDirection(graph3d.dragTmpDir);
        graph3d.dragPlane.setFromNormalAndCoplanarPoint(graph3d.dragTmpDir, graph3d.dragPlaneAnchor);
        n.fx = n.x; n.fy = n.y; n.fz = n.z;
      }
      if (!graph3d.simulation && graph3d.simNodes.length) startForceSimulation();
      if (graph3d.simulation) graph3d.simulation.alphaTarget(0.22).alpha(Math.max(graph3d.simulation.alpha(), 0.38));
    }
    if (graph3d.dragIsActive) {
      const n = graph3d.idToSimNode.get(graph3d.draggingNodeId);
      if (n && graph3d.raycaster && graph3d.camera) {
        const rect = graph3d.renderer.domElement.getBoundingClientRect();
        graph3d.pointerNdc.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
        graph3d.pointerNdc.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
        graph3d.raycaster.setFromCamera(graph3d.pointerNdc, graph3d.camera);
        const dist = graph3d.raycaster.ray.intersectPlane(graph3d.dragPlane, graph3d.dragHit);
        if (dist !== null) {
          n.x = n.fx = graph3d.dragHit.x; n.y = n.fy = graph3d.dragHit.y; n.z = n.fz = graph3d.dragHit.z;
          n.vx = n.vy = n.vz = 0;
          syncMeshesFromSim(); scheduleLayoutSave();
        }
      }
    }
    return;
  }
  scheduleHoverPick(ev);
}

function applyForce3DLayout(doConfirm) {
  if (!graph3d.simNodes.length) return;
  if (doConfirm && !confirm(t('reset_layout_confirm'))) return;
  graph3d.simNodes.forEach(n => { n.x=(Math.random()-0.5)*36; n.y=(Math.random()-0.5)*36; n.z=(Math.random()-0.5)*36; n.vx=n.vy=n.vz=0; });
  syncMeshesFromSim();
  startForceSimulation();
}

// ── Renderer (called by core after data loads) ────────────────────────────────
function renderGraph() {
  const container = document.getElementById('graph-container');
  disposeGraph3d();

  const degree = new Map();
  graphData.nodes.forEach(n => degree.set(n.id, 0));
  graphData.edges.forEach(e => { degree.set(e.source, (degree.get(e.source)||0)+1); degree.set(e.target, (degree.get(e.target)||0)+1); });

  graph3d.simNodes = graphData.nodes.map(n => ({
    id:n.id, label:n.label, domain:n.domain, state:n.state,
    x:(Math.random()-0.5)*42, y:(Math.random()-0.5)*42, z:(Math.random()-0.5)*42,
    vx:0, vy:0, vz:0
  }));
  graph3d.simNodes.forEach(n => graph3d.idToSimNode.set(n.id, n));

  const w = Math.max(container.clientWidth, 300), h = Math.max(container.clientHeight, 200);
  graph3d.scene = new THREE.Scene();
  graph3d.scene.background = new THREE.Color(0x1a1a2e);
  graph3d.camera = new THREE.PerspectiveCamera(55, w/h, 0.5, 120000);
  graph3d.camera.position.set(280, 200, 280);

  graph3d.renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
  graph3d.renderer.setSize(w, h);
  const dprCap = graphData.nodes.length > LARGE_GRAPH_LABEL_THRESHOLD ? Math.min(window.devicePixelRatio, 1.35) : Math.min(window.devicePixelRatio, 2);
  graph3d.renderer.setPixelRatio(dprCap);
  container.appendChild(graph3d.renderer.domElement);

  graph3d.css2dRenderer = new CSS2DRenderer();
  graph3d.css2dRenderer.setSize(w, h);
  Object.assign(graph3d.css2dRenderer.domElement.style, { position:'absolute', top:'0', left:'0', pointerEvents:'none' });
  container.appendChild(graph3d.css2dRenderer.domElement);

  const shapeEl = document.getElementById('slider-shape-size');
  const textEl  = document.getElementById('slider-label-size');
  if (shapeEl) graph3d.shapeSizeFactor = parseFloat(shapeEl.value) || 1;
  if (textEl)  graph3d.labelFontPx     = parseInt(textEl.value, 10) || 11;

  const lblCb = document.getElementById('labels-show-all');
  if (lblCb) {
    const sv = localStorage.getItem(STORAGE_3D_LABELS_SHOW_ALL);
    lblCb.checked = sv === '1' ? true : sv === '0' ? false : graphData.nodes.length <= LARGE_GRAPH_LABEL_THRESHOLD;
  }
  const arCb = document.getElementById('auto-rotate');
  if (arCb) { const ars = localStorage.getItem(STORAGE_3D_AUTO_ROTATE); if (ars === '1') arCb.checked = true; else if (ars === '0') arCb.checked = false; }

  graph3d.controls = new OrbitControls(graph3d.camera, graph3d.renderer.domElement);
  graph3d.controls.enableDamping = true;
  graph3d.controls.dampingFactor = 0.08;
  graph3d.controls.zoomSpeed = 0.55;
  graph3d.controls.autoRotateSpeed = AUTO_ROTATE_SPEED;

  graph3d.nodeGroup = new THREE.Group();
  graph3d.edgeGroup = new THREE.Group();
  graph3d.scene.add(new THREE.AmbientLight(0xffffff, 0.48));
  const dir = new THREE.DirectionalLight(0xffffff, 0.85);
  dir.position.set(120, 180, 80);
  graph3d.scene.add(dir);
  graph3d.scene.add(graph3d.edgeGroup);
  graph3d.scene.add(graph3d.nodeGroup);

  graphData.nodes.forEach(gd => {
    const mesh = createNodeMesh(gd, degree.get(gd.id)||0);
    mesh.userData.nodeId = gd.id; mesh.userData.domain = gd.domain; mesh.userData.baseScale = 1;
    graph3d.nodeGroup.add(mesh); graph3d.idToMesh.set(gd.id, mesh);
    if (shouldAttachAllLabels()) attachNodeLabel(mesh, gd.id, gd.label);
  });
  if (!shouldAttachAllLabels()) { ensureFloatingHoverLabel(); syncFloatingLabelToHover(); }
  applyLabelFontSizes();

  rebuildEdgeIndex();
  syncMeshesFromSim();

  graph3d.raycaster = new THREE.Raycaster();
  const canvas = graph3d.renderer.domElement;
  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('pointermove', onCanvasPointerMove);
  canvas.addEventListener('pointerdown', onCanvasPointerDown, true);
  canvas.addEventListener('pointerup', onCanvasPointerUp);
  canvas.addEventListener('pointercancel', onCanvasPointerUp);
  graph3d.resizeHandler = onGraphResize;
  window.addEventListener('resize', graph3d.resizeHandler);

  animateGraph3dLoop();
  buildDomainFilters(applyGraphVisualFilters);
  applyGraphVisualFilters();
  applyOrbitCameraLimits();
  attachGraphSafeWheelIfNeeded();
  syncAutoRotateFromUI();
}

// ── State update (called by core on state_changed) ────────────────────────────
function updateNodeState(entityId) {
  const nodeId = entityToNodeId(entityId);
  if (!nodeId || !graph3d.idToMesh.has(nodeId)) return;
  const state = nodeId === entityId
    ? (states[entityId]?.state ?? 'off')
    : deviceAggregatedState(nodeId);
  const gn = graphData.nodes.find(x => x.id === nodeId);
  if (gn) gn.state = state;
  const sn = graph3d.idToSimNode.get(nodeId);
  if (sn) sn.state = state;
  setMeshMaterialState(graph3d.idToMesh.get(nodeId), nodeId, state);
}

// ── Live mode toggle: reapply all mesh colours ────────────────────────────────
function onLiveModeChange() {
  graph3d.idToMesh.forEach((mesh, nodeId) => {
    const sn = graph3d.idToSimNode.get(nodeId);
    const state = sn?.state || 'off';
    setMeshMaterialState(mesh, nodeId, state);
  });
}

// ── Automation/script triggered: flash + pulse + edge particle propagation ────
function onEntityTriggered(entityId) {
  if (!graph3d.scene) return;
  const nodeId = entityToNodeId(entityId);
  if (!nodeId || !graph3d.idToMesh.has(nodeId)) return;
  const mesh = graph3d.idToMesh.get(nodeId);
  const baseScale = mesh.userData.baseScale || 1;
  const now = performance.now();
  // Remove any existing animation for this node
  graph3d.activeAnimations = graph3d.activeAnimations.filter(a => a.nodeId !== nodeId);
  // Flash: 800 ms
  graph3d.activeAnimations.push({ nodeId, type: 'flash', t0: now, duration: 800 });
  // Pulse: starts 200 ms after flash, 1000 ms
  graph3d.activeAnimations.push({ nodeId, type: 'pulse', t0: now + 200, duration: 1000, baseScale });
  // Spawn particles on all action/trigger edges from this node
  const outEdges = graphData.edges.filter(e => e.source === nodeId && (e.type === 'action' || e.type === 'trigger'));
  outEdges.forEach(edge => {
    const particleGeo = new THREE.SphereGeometry(4, 6, 5);
    const particleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
    const particleMesh = new THREE.Mesh(particleGeo, particleMat);
    const a = graph3d.idToSimNode.get(edge.source);
    if (a) particleMesh.position.set(a.x || 0, a.y || 0, a.z || 0);
    graph3d.scene.add(particleMesh);
    // Particle travel time proportional to edge length
    const b = graph3d.idToSimNode.get(edge.target);
    const dist = a && b
      ? Math.sqrt((b.x-a.x)**2 + (b.y-a.y)**2 + (b.z-a.z)**2)
      : 100;
    const duration = Math.max(400, Math.min(1800, dist * 8));
    graph3d.activeParticles.push({ src: edge.source, tgt: edge.target, t0: now, duration, mesh: particleMesh });
  });
}

// ── Layout persistence ────────────────────────────────────────────────────────
function saveLayoutToStorage() {
  if (!graph3d.simNodes.length) return;
  const pos = {};
  graph3d.simNodes.forEach(n => { pos[n.id] = { x:n.x, y:n.y, z:n.z }; });
  localStorage.setItem(STORAGE_LAYOUT_3D, JSON.stringify(pos));
  schedulePushLayoutToServer(pos, 'layout_3d');
}

function loadLayoutFromStorage() {
  if (!graph3d.simNodes.length) return;
  const pos = readStoredLayoutRaw(STORAGE_LAYOUT_3D);
  if (layoutObjectHasKeys(pos)) {
    let any = false;
    const zs = [];
    graph3d.simNodes.forEach(n => {
      const p = pos[n.id];
      if (!p) return;
      n.x = p.x; n.y = p.y;
      n.z = Number.isFinite(Number(p.z)) ? Number(p.z) : (Math.random()-0.5)*48;
      zs.push(n.z); any = true;
    });
    if (graph3d.simulation) { graph3d.simulation.stop(); graph3d.simulation = null; }
    syncMeshesFromSim();
    centerCameraOnGraph();
    if (!any) {
      applyForce3DLayout(false);
    } else if (any && Math.max(...zs) - Math.min(...zs) < 22) {
      /* Legacy 2D-like layout: re-spread in 3D */
      graph3d.simNodes.forEach(n => { n.vx = n.vy = n.vz = 0; });
      startForceSimulation();
    }
  } else {
    applyForce3DLayout(false);
  }
}

// ── 3D-specific UI bindings ───────────────────────────────────────────────────
let _graphUIBound = false;
function bindGraphUI() {
  if (_graphUIBound) return;
  _graphUIBound = true;

  document.getElementById('btn-reset-layout').onclick = () => applyForce3DLayout(true);
  document.getElementById('btn-center').onclick = () => centerCameraOnGraph();
  document.getElementById('search').oninput = () => {
    if (!graph3d.renderer) return;
    refreshSearchDimming();
    const q = document.getElementById('search').value.trim().toLowerCase();
    if (!q) { if (graph3d.hoveredId) highlightNeighbors3d(graph3d.hoveredId); else resetNodeEmissiveAndOrphans(); return; }
    const first = graph3d.simNodes.find(n => n.id.toLowerCase().includes(q) || (n.label||'').toLowerCase().includes(q));
    if (first) { const m = graph3d.idToMesh.get(first.id); if (m?.visible) { graph3d.controls.target.copy(m.position); graph3d.controls.update(); } }
  };
  document.getElementById('orphans').onchange = () => { if (graph3d.renderer) applyGraphVisualFilters(); };

  const shapeSl = document.getElementById('slider-shape-size');
  if (shapeSl) {
    const sv = localStorage.getItem(STORAGE_3D_SHAPE_SCALE);
    if (sv != null && !Number.isNaN(parseFloat(sv))) shapeSl.value = String(Math.min(2.3, Math.max(0.35, parseFloat(sv))));
    graph3d.shapeSizeFactor = parseFloat(shapeSl.value) || 1;
    shapeSl.addEventListener('input', () => {
      graph3d.shapeSizeFactor = parseFloat(shapeSl.value) || 1;
      localStorage.setItem(STORAGE_3D_SHAPE_SCALE, shapeSl.value);
      if (graph3d.renderer) refreshSearchDimming();
    });
  }

  const textSl = document.getElementById('slider-label-size');
  if (textSl) {
    const tv = localStorage.getItem(STORAGE_3D_LABEL_PX);
    if (tv != null && !Number.isNaN(parseInt(tv, 10))) textSl.value = String(Math.min(24, Math.max(7, parseInt(tv, 10))));
    graph3d.labelFontPx = parseInt(textSl.value, 10) || 11;
    textSl.addEventListener('input', () => {
      graph3d.labelFontPx = parseInt(textSl.value, 10) || 11;
      localStorage.setItem(STORAGE_3D_LABEL_PX, textSl.value);
      applyLabelFontSizes();
      if (!shouldAttachAllLabels()) syncFloatingLabelToHover();
    });
  }

  const lblAll = document.getElementById('labels-show-all');
  if (lblAll) lblAll.addEventListener('change', () => {
    localStorage.setItem(STORAGE_3D_LABELS_SHOW_ALL, lblAll.checked ? '1' : '0');
    if (graph3d.renderer) reapplyLabelMode();
  });

  const arRot = document.getElementById('auto-rotate');
  if (arRot) arRot.addEventListener('change', () => {
    localStorage.setItem(STORAGE_3D_AUTO_ROTATE, arRot.checked ? '1' : '0');
    syncAutoRotateFromUI();
  });

  const dbgCam = document.getElementById('debug-cam-toggle');
  if (dbgCam) {
    try { dbgCam.checked = sessionStorage.getItem(STORAGE_3D_DEBUG_CAM) === '1'; } catch (e) {}
    dbgCam.addEventListener('change', () => {
      try { sessionStorage.setItem(STORAGE_3D_DEBUG_CAM, dbgCam.checked ? '1' : '0'); } catch (e) {}
      updateDebugCamPanel();
    });
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
registerRenderer({ renderGraph, updateNodeState, loadLayoutFromStorage, onLiveModeChange, onEntityTriggered });
applyI18n();
bindCommonUI();
bindGraphUI();
document.getElementById('btn-legend')?.addEventListener('click', () => {
  buildLegend('ha-legend-panel');
  document.getElementById('ha-legend-panel')?.classList.toggle('hidden');
});
await initAuthPanel();
  </script>

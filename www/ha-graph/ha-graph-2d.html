<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Graph Explorer — 2D</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="ha-graph-core.css">
  <style>
    /* ── 2D-specific layout ───────────────────────────────────────────────── */
    #graph-container { flex: 1; position: relative; min-height: 0; }
    /* Isometric grid background */
    #grid-3d {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      transform: scaleY(0.866) rotateX(60deg) rotateZ(0deg);
      transform-style: preserve-3d;
      perspective: 1200px;
      pointer-events: none;
    }
    #cy { position: absolute; inset: 0; z-index: 1; }
    /* ── Sidebar (2D: slides in from right) ─────────────────────────────── */
    #sidebar {
      position: absolute; top: 0; right: 0;
      width: 320px; max-width: 90vw; height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--accent);
      box-shadow: -4px 0 20px var(--shadow);
      z-index: 10;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      padding: 16px;
    }
    #sidebar.open { transform: translateX(0); }
  </style>
</head>
<body>
  <div id="app">
    <div id="auth-panel">
      <div class="card">
        <div class="auth-head">
          <h2 data-i18n="auth_title">HA Graph Explorer v2</h2>
          <span class="server-sync-pill server-sync--checking" data-server-sync-pill role="status" aria-live="polite">
            <span class="server-sync-dot" aria-hidden="true"></span>
            <span class="server-sync-label">…</span>
          </span>
        </div>
        <p style="color:var(--text-dim);font-size:14px;margin-top:0;" data-i18n="auth_subtitle"></p>
        <label for="base-url-input" data-i18n="auth_baseUrl">Base URL (optional)</label>
        <input type="text" id="base-url-input" data-i18n-placeholder="auth_baseUrlPlaceholder" autocomplete="off">
        <p class="hint" style="margin-top:0;" data-i18n="auth_baseUrlHint"></p>
        <label for="token-input" data-i18n="auth_token">Access token</label>
        <input type="password" id="token-input" data-i18n-placeholder="auth_tokenPlaceholder" autocomplete="off">
        <button type="button" id="auth-save" data-i18n="auth_save">Save and connect</button>
        <button type="button" id="auth-close" class="secondary" style="margin-left:8px;" data-i18n="auth_close">Close</button>
        <p id="auth-save-result" class="hint" role="status" aria-live="polite"></p>
        <p class="hint" data-i18n="auth_tokenHint"></p>
        <p class="hint" style="margin-top:8px;" data-i18n="auth_serverSyncHint"></p>
        <hr style="border:none;border-top:1px solid var(--accent);margin:16px 0;">
        <p style="font-size:13px;color:var(--text-dim);margin-bottom:8px;" data-i18n="backup_heading"></p>
        <label style="display:block;margin-bottom:8px;"><input type="checkbox" id="export-include-token"> <span data-i18n="backup_includeToken">Include token</span></label>
        <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
          <button type="button" id="btn-export-backup" data-i18n="backup_export">Export backup</button>
          <button type="button" id="btn-import-backup" data-i18n="backup_import">Restore backup</button>
          <input type="file" id="import-backup-file" accept=".json,application/json" style="display:none;">
        </div>
      </div>
    </div>

    <div id="toolbar">
      <span id="lang-switcher" style="margin-right:4px;">
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="fr">FR</button>
      </span>
      <a href="ha-graph-3d.html" class="toolbar-view-link" style="margin-right:4px;" data-i18n="view_3d" data-i18n-title="view_3d_title">3D</a>
      <input type="text" id="search" data-i18n-placeholder="search_placeholder">
      <button type="button" id="btn-reset-layout" data-i18n-title="btn_reset_layout_title"><span data-i18n="btn_reset_layout">Reset layout</span></button>
      <button type="button" id="btn-center" data-i18n-title="btn_center_title"><span data-i18n="btn_center">Center</span></button>
      <label><input type="checkbox" id="orphans"> <span data-i18n="orphans_label">Show orphans</span></label>
      <button type="button" id="live-mode-btn" class="live-mode-btn" data-i18n="live_mode" data-i18n-title="live_mode_title">Live</button>
      <button type="button" id="btn-legend" data-i18n-title="legend_title" style="font-size:12px;padding:5px 10px;">⬛ <span data-i18n="legend_title">Legend</span></button>
      <span id="domain-filters"></span>
      <button type="button" id="btn-backup" data-i18n-title="btn_backup_title"><span data-i18n="btn_backup">Backup</span></button>
      <span style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <span class="server-sync-pill server-sync--checking" data-server-sync-pill role="status" aria-live="polite">
          <span class="server-sync-dot" aria-hidden="true"></span>
          <span class="server-sync-label">…</span>
        </span>
        <span id="status" data-i18n="status_disconnected">Disconnected</span>
        <div id="progress-bar" style="display:none;width:160px;"><div class="fill"></div></div>
        <span id="progress-text"></span>
      </span>
    </div>

    <div id="ha-legend-panel" class="ha-legend hidden"></div>
    <div id="graph-container">
      <div id="grid-3d"></div>
      <div id="cy"></div>
    </div>

    <aside id="sidebar">
      <button type="button" id="sidebar-close" aria-label="Close" data-i18n-aria="close_aria">&times;</button>
      <div id="sidebar-content"></div>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script type="module">
import {
  STORAGE_LAYOUT_2D, DOMAIN_EMOJI, EDGE_COLORS,
  t, getDomainLabels, applyI18n,
  readStoredLayoutRaw, layoutObjectHasKeys, schedulePushLayoutToServer,
  states, graphData, entityToDevice, deviceToEntities,
  entityToNodeId, deviceAggregatedState, entityDomain,
  getDomainColor, liveMode,
  setStatus, setProgress, escapeHtml,
  openSidebar, closeSidebar, buildDomainFilters, buildLegend,
  registerRenderer, bindCommonUI, initAuthPanel
} from './ha-graph-core.js';

// ── 2D state ──────────────────────────────────────────────────────────────────
let cy = null;
const DOMAIN_ICONS = Object.fromEntries(getDomainLabels().map(d => [d.id, d.icon]));

// ── Layout debug (console) — active si: haGraphLayoutDebug(true) puis reload, ou ?debugLayout=1
function layoutDebugEnabled() {
  try {
    if (localStorage.getItem('ha_graph_debug_layout') === '1') return true;
    return new URLSearchParams(location.search).has('debugLayout');
  } catch (e) { return false; }
}
function layoutLog(...args) {
  if (layoutDebugEnabled()) console.log('[ha-graph layout]', ...args);
}

// ── Node colour ───────────────────────────────────────────────────────────────
// Priority order for domain selection on device nodes
const DOMAIN_PRIORITY = ['light','switch','cover','lock','climate','media_player','fan','binary_sensor','input_boolean','automation','script','scene','sensor'];

function _bestDeviceColor(entityIds) {
  // Find the highest-priority domain entity that is 'on'
  let bestPrio = Infinity, bestEid = null;
  for (const eid of (entityIds || [])) {
    const s = states[eid];
    if (!s || s.state === 'unavailable') continue;
    const dom = entityDomain(eid);
    const prio = DOMAIN_PRIORITY.indexOf(dom);
    if (s.state === 'on' && (prio >= 0 && prio < bestPrio)) {
      bestPrio = prio; bestEid = eid;
    }
  }
  if (bestEid) return getDomainColor(entityDomain(bestEid), 'on', states[bestEid]?.attributes);
  // All off/unavailable — use the highest-priority domain's off color
  let fallbackEid = null, fallbackPrio = Infinity;
  for (const eid of (entityIds || [])) {
    const dom = entityDomain(eid);
    const prio = DOMAIN_PRIORITY.indexOf(dom);
    if (prio >= 0 && prio < fallbackPrio) { fallbackPrio = prio; fallbackEid = eid; }
  }
  if (fallbackEid) {
    const s = states[fallbackEid];
    return getDomainColor(entityDomain(fallbackEid), s?.state ?? 'off', s?.attributes);
  }
  return '#455a64'; // neutral dark
}

function nodeColor2d(nodeId, state) {
  if (!liveMode) {
    if (state === 'unavailable') return '#e94560';
    if (state === 'on')          return '#a8e6cf';
    return '#6c757d';
  }
  // Live mode: semantic colour per domain
  const node = graphData.nodes.find(n => n.id === nodeId);
  if (!node) return getDomainColor('device', state);
  if (node.domain === 'device') return _bestDeviceColor(node.entityIds);
  const s = states[nodeId];
  return getDomainColor(node.domain, state, s?.attributes);
}

/** Couleurs live en bypass + coupe la transition 0.3s du thème (sinon fondu vers gris qui masque la légende). */
function applyLiveNodeStyle(n, nodeId, state) {
  n.style({
    'transition-duration': '0ms',
    'transition-property': 'none',
    'background-color': nodeColor2d(nodeId, state)
  });
  n.removeClass('on off unavailable');
}

// ── Renderer ──────────────────────────────────────────────────────────────────
function renderGraph() {
  const container = document.getElementById('cy');
  if (cy) cy.destroy();

  const elements = [
    ...graphData.nodes.map(n => ({
      data: { id: n.id, label: n.label, domain: n.domain, state: n.state, icon: n.icon || DOMAIN_EMOJI[n.domain] || '⬤', faIcon: DOMAIN_ICONS[n.domain] || 'fa-circle' },
      classes: n.state === 'unavailable' ? 'unavailable' : (n.state === 'on' ? 'on' : 'off')
    })),
    ...graphData.edges.map((e, i) => ({
      data: { id: 'e'+i, source: e.source, target: e.target, type: e.type || 'member' }
    }))
  ];

  cy = cytoscape({
    container,
    elements,
    style: [
      { selector: 'node', style: {
          'label': el => { const icon = el.data('icon')||'⬤', name = el.data('label')||''; return name ? icon+'\n'+name : icon; },
          'text-valign':'bottom', 'text-halign':'center', 'font-size':'10px', 'color':'#e8e8e8',
          'text-margin-y':8, 'width':52, 'height':52, 'background-color':'#6c757d',
          'border-width':2, 'border-color':'#16213e',
          'transition-duration':'0.3s', 'transition-property':'background-color, border-color',
          'text-wrap':'wrap', 'text-max-width':'160px',
          'overlay-color':'rgba(0,0,0,0.25)', 'overlay-padding':2, 'overlay-opacity':0
      }},
      { selector: 'node[domain="script"]',     style: { 'shape':'rectangle' } },
      { selector: 'node[domain="automation"]', style: { 'shape':'diamond' } },
      { selector: 'node[domain="scene"]',      style: { 'shape':'triangle' } },
      { selector: 'node:selected',  style: { 'overlay-opacity':0.5 } },
      { selector: 'node.on',        style: { 'background-color':'#a8e6cf', 'border-color':'#7bc99a' } },
      { selector: 'node.off',       style: { 'background-color':'#6c757d', 'border-color':'#5a6268' } },
      { selector: 'node.unavailable', style: { 'background-color':'#e94560', 'border-color':'#c73e54' } },
      { selector: 'node.highlight', style: { 'border-width':4, 'border-color':'#ffecd2', 'overlay-opacity':0.3 } },
      { selector: 'node.dim',       style: { 'opacity':0.25 } },
      { selector: 'node.hidden',    style: { 'display':'none' } },
      { selector: 'node.orphan',    style: { 'border-width':4, 'border-color':'#ff9a8b' } },
      { selector: 'edge', style: {
          'width':1.5, 'line-color':'#a8e6cf', 'target-arrow-color':'#a8e6cf',
          'target-arrow-shape':'triangle', 'curve-style':'bezier',
          'transition-duration':'0.3s', 'opacity':0.55
      }},
      { selector: 'edge[type="trigger"]', style: { 'line-color':'#ff9a8b', 'target-arrow-color':'#ff9a8b' } },
      { selector: 'edge[type="action"]',  style: { 'line-color':'#ffecd2', 'target-arrow-color':'#ffecd2' } },
      { selector: 'edge[type="member"]',  style: { 'line-color':'#a8e6cf', 'target-arrow-color':'#a8e6cf' } },
      { selector: 'edge[type="target"]',  style: { 'line-color':'#d4a5a5', 'target-arrow-color':'#d4a5a5' } },
      { selector: 'edge.highlight', style: { 'width':4 } },
      { selector: 'edge.dim',       style: { 'opacity':0.2 } },
      { selector: 'edge.hidden',    style: { 'display':'none' } }
    ],
    layout: { name: 'preset' },
    minZoom: 0.05, maxZoom: 5, wheelSensitivity: 0.3
  });

  cy.on('tap', 'node', evt => openSidebar(evt.target.data('id')));
  cy.on('mouseover', 'node', evt => {
    const nb = evt.target.neighborhood();
    cy.elements().addClass('dim');
    nb.removeClass('dim').addClass('highlight');
  });
  cy.on('mouseout', 'node', () => cy.elements().removeClass('dim highlight'));
  cy.on('drag', 'node', () => saveLayoutToStorage());

  buildDomainFilters(filterByDomains);

  document.getElementById('btn-reset-layout').onclick = () => {
    if (!confirm(t('reset_layout_confirm'))) return;
    layoutLog('reset layout click → scheduling next tick');
    setTimeout(() => applyColaLayout(), 0);
  };
  document.getElementById('btn-center').onclick = () => { if (cy?.nodes().length) cy.fit(50); };
  document.getElementById('search').oninput = onSearchInput;
  document.getElementById('orphans').onchange = toggleOrphans;
}

// ── State update ──────────────────────────────────────────────────────────────
function updateNodeState(entityId) {
  if (!cy) return;
  const nodeId = entityToNodeId(entityId);
  if (!nodeId) return;
  const node = cy.getElementById(nodeId);
  if (!node.length) return;
  const state = nodeId === entityId
    ? (states[entityId]?.state ?? 'off')
    : deviceAggregatedState(nodeId);
  node.data('state', state);
  if (liveMode) {
    applyLiveNodeStyle(node, nodeId, state);
  } else {
    node.removeClass('on off unavailable');
    node.style({
      'background-color': '',
      'transition-duration': '',
      'transition-property': ''
    });
    node.addClass(state === 'unavailable' ? 'unavailable' : (state === 'on' ? 'on' : 'off'));
  }
}

// ── Live mode toggle: reapply all node colours ────────────────────────────────
// Use graphData + getElementById so each node gets a singleton collection; ele.style()
// only affects the first element when the collection has multiple nodes.
function onLiveModeChange() {
  if (!cy) return;
  cy.batch(() => {
    graphData.nodes.forEach(gd => {
      const n = cy.getElementById(gd.id);
      if (!n.length) return;
      const state = n.data('state') || 'off';
      if (liveMode) {
        applyLiveNodeStyle(n, gd.id, state);
      } else {
        n.style({
          'background-color': '',
          'transition-duration': '',
          'transition-property': ''
        });
        n.removeClass('on off unavailable');
        n.addClass(state === 'unavailable' ? 'unavailable' : (state === 'on' ? 'on' : 'off'));
      }
    });
  });
}

// ── Automation/script triggered: flash node + propagate on action edges ───────
function onEntityTriggered(entityId) {
  if (!cy) return;
  const node = cy.getElementById(entityId);
  if (!node.length) return;
  const origColor = liveMode ? nodeColor2d(entityId, node.data('state') || 'on') : '#e8e8e8';
  const endFlash = { duration: 500 };
  if (liveMode) {
    endFlash.complete = () => applyLiveNodeStyle(node, entityId, node.data('state') || 'on');
  }
  // Flash: white → original
  node.stop(true).animate({ style: { 'background-color': '#ffffff', 'width': 64, 'height': 64 } }, { duration: 200 })
      .animate({ style: { 'background-color': '#ffec9e', 'width': 60, 'height': 60 } }, { duration: 200 })
      .animate({ style: { 'background-color': origColor,  'width': 52, 'height': 52 } }, endFlash);
  // Propagate on action edges
  const actionEdges = cy.edges(`[source="${entityId}"][type="action"], [source="${entityId}"][type="trigger"]`);
  actionEdges.forEach(edge => {
    edge.stop(true)
        .animate({ style: { 'line-color': '#ffffff', 'width': 4 } }, { duration: 200 })
        .animate({ style: { 'line-color': '#ffec9e', 'width': 3 } }, { duration: 300 })
        .animate({ style: { 'line-color': EDGE_COLORS[edge.data('type')] || '#a8e6cf', 'width': 1.5 } }, { duration: 600 });
  });
}

// ── Layout ────────────────────────────────────────────────────────────────────
function saveLayoutToStorage() {
  if (!cy) return;
  const pos = {};
  cy.nodes().forEach(n => { const p = n.position(); pos[n.id()] = { x: p.x, y: p.y }; });
  localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(pos));
  schedulePushLayoutToServer(pos, 'layout_2d');
}

function loadLayoutFromStorage() {
  const pos = readStoredLayoutRaw(STORAGE_LAYOUT_2D);
  if (layoutObjectHasKeys(pos) && cy) {
    cy.nodes().forEach(n => { const p = pos[n.id()]; if (p) n.position(p); });
    cy.fit(50);
  } else {
    applyColaLayout();
  }
}

/** Écarte un peu les nœuds depuis le centre du composant (complément au cose sur hubs très denses). */
function expandComponentRadial(comp, scale) {
  const nodes = comp.nodes();
  const n = nodes.length;
  if (n <= 1 || scale <= 1) return;
  let sx = 0, sy = 0;
  nodes.forEach(node => {
    const p = node.position();
    sx += p.x;
    sy += p.y;
  });
  sx /= n;
  sy /= n;
  nodes.forEach(node => {
    const p = node.position();
    node.position({
      x: sx + (p.x - sx) * scale,
      y: sy + (p.y - sy) * scale
    });
  });
}

/** Longueur cible des arêtes : plus les extrémités sont des « hubs », plus on étire (évite feuilles empilées). */
function coseIdealEdgeLength(edge) {
  const ds = edge.source().connectedEdges().length;
  const dt = edge.target().connectedEdges().length;
  const hub = Math.max(ds, dt);
  return 185 + Math.min(150, hub * 7);
}

/** Force layout on one connected component (nodes+edges). fit:false — tiling places the block. */
// Sans arêtes le cose va bien ; avec arêtes il faut des ressorts plus longs + plus rigides que la répulsion ne gagne.
function layoutOneComponent(comp, cn) {
  if (cn <= 1) return;
  const ce = comp.edges().length;
  const base = {
    name: 'cose',
    animate: false,
    fit: false,
    padding: 72,
    randomize: true,
    nodeDimensionsIncludeLabels: true,
    nodeRepulsion: 19500,
    idealEdgeLength: coseIdealEdgeLength,
    edgeElasticity: 0.58,
    nestingFactor: 0.1,
    gravity: 0.08,
    coolingFactor: 0.94,
    minTemp: 0.5,
    initialTemp: 1200
  };
  let numIter = cn <= 60
    ? Math.min(280, 150 + Math.floor(cn * 0.95))
    : Math.min(180, Math.max(60, Math.floor(15000 / cn)));
  // Graphes très liés : laisser plus de temps au ressort pour écarter les paires connectées
  numIter += Math.min(110, Math.floor(ce * 0.65));
  base.numIter = numIter;
  comp.layout(base).run();
  const spread = Math.min(1.26, 1.08 + cn * 0.0003 + Math.min(0.1, ce / 450));
  expandComponentRadial(comp, spread);
}

function applyColaLayout() {
  if (!cy) return;
  const dbg = layoutDebugEnabled();
  const tAll = dbg ? performance.now() : 0;
  const n = cy.nodes().length;
  const e = cy.edges().length;
  const done = () => setTimeout(() => {
    if (dbg) {
      const ts = performance.now();
      saveLayoutToStorage();
      layoutLog('saveLayoutToStorage total ms', (performance.now() - ts).toFixed(1));
      layoutLog('reset layout total ms (incl. save)', (performance.now() - tAll).toFixed(1));
    } else {
      saveLayoutToStorage();
    }
  }, 120);
  // Espace entre blocs + largeur de ligne (~2× la fenêtre) avant de passer à la ligne suivante
  const margin = 200;
  const cw = typeof cy.width === 'function' ? cy.width() : 0;
  const maxRowW = Math.max(1480, (cw || 1100) * 2);

  layoutLog('layout start', { nodes: n, edges: e, strategy: 'components+tiles' });
  try {
    const tRun = dbg ? performance.now() : 0;
    let comps = cy.elements().components();
    comps = [...comps].sort((a, b) => b.nodes().length - a.nodes().length);
    let cursorX = 0, cursorY = 0, rowH = 0;

    for (const comp of comps) {
      const cn = comp.nodes().length;
      if (!cn) continue;
      layoutOneComponent(comp, cn);
      const bb = comp.boundingBox({ includeLabels: true });
      if (cursorX > 0 && cursorX + bb.w > maxRowW) {
        cursorX = 0;
        cursorY += rowH + margin;
        rowH = 0;
      }
      const dx = cursorX - bb.x1;
      const dy = cursorY - bb.y1;
      comp.nodes().forEach(node => {
        const p = node.position();
        node.position({ x: p.x + dx, y: p.y + dy });
      });
      cursorX += bb.w + margin;
      rowH = Math.max(rowH, bb.h);
    }

    cy.fit(32);
    if (dbg) {
      layoutLog('layout (all components) sync ms', (performance.now() - tRun).toFixed(1), 'components', comps.length);
      requestAnimationFrame(() => {
        layoutLog('after layout + 1 rAF ms', (performance.now() - tAll).toFixed(1));
      });
    }
    done();
  } catch (err) {
    layoutLog('layout error', err);
    try {
      cy.layout({ name: 'circle', fit: true, padding: 40, nodeDimensionsIncludeLabels: true }).run();
    } catch (e2) { layoutLog('fallback error', e2); }
    done();
  }
}

// ── Filters / search ──────────────────────────────────────────────────────────
function filterByDomains() {
  const checked = new Set(Array.from(document.querySelectorAll('.domain-filter:checked')).map(c => c.dataset.domain));
  if (!cy) return;
  cy.nodes().forEach(n => n.toggleClass('hidden', !checked.has(n.data('domain'))));
  cy.edges().forEach(e => e.toggleClass('hidden', e.source().hasClass('hidden') || e.target().hasClass('hidden')));
}

function toggleOrphans() {
  const show = document.getElementById('orphans').checked;
  if (!cy) return;
  const withEdges = new Set();
  cy.edges().forEach(ed => { withEdges.add(ed.source().id()); withEdges.add(ed.target().id()); });
  cy.nodes().forEach(n => n.toggleClass('orphan', show && !withEdges.has(n.id())));
}

function onSearchInput() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!cy || !q) { cy?.elements().removeClass('dim highlight'); return; }
  const match = n => n.data('id').toLowerCase().includes(q) || (n.data('label')||'').toLowerCase().includes(q);
  cy.elements().addClass('dim');
  cy.nodes().filter(match).removeClass('dim').addClass('highlight');
  cy.nodes().filter(match).connectedEdges().removeClass('dim');
  const first = cy.nodes().filter(match).first();
  if (first.length) cy.animate({ center: { eles: first }, zoom: 1.5 }, { duration: 300 });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
registerRenderer({ renderGraph, updateNodeState, loadLayoutFromStorage, onLiveModeChange, onEntityTriggered });
applyI18n();
bindCommonUI();
document.getElementById('btn-legend')?.addEventListener('click', () => {
  buildLegend('ha-legend-panel');
  document.getElementById('ha-legend-panel')?.classList.toggle('hidden');
});
await initAuthPanel();

if (typeof window !== 'undefined') {
  window.haGraphLayoutDebug = function (on) {
    try {
      if (on) localStorage.setItem('ha_graph_debug_layout', '1');
      else localStorage.removeItem('ha_graph_debug_layout');
    } catch (e) {}
    console.log('[ha-graph layout] debug', on ? 'ON — recharger la page' : 'OFF');
  };
  if (layoutDebugEnabled()) console.log('[ha-graph layout] debug actif (URL ?debugLayout=1 ou localStorage ha_graph_debug_layout)');
}
  </script>
</body>

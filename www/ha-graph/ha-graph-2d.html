<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Graph Explorer — 2D</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #0f3460;
      --text: #e8e8e8;
      --text-dim: #a0a0a0;
      --on: #a8e6cf;
      --off: #6c757d;
      --unavailable: #e94560;
      --edge-trigger: #ff9a8b;
      --edge-action: #ffecd2;
      --edge-member: #a8e6cf;
      --edge-target: #d4a5a5;
      --shadow: rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    /* Toolbar */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--accent);
      flex-shrink: 0;
    }
    #toolbar input[type="text"] {
      background: var(--accent);
      border: 1px solid transparent;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      width: 200px;
      transition: border-color 0.2s;
    }
    #toolbar input::placeholder { color: var(--text-dim); }
    #toolbar input:focus {
      outline: none;
      border-color: var(--on);
    }
    #toolbar label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
    }
    #toolbar label input { width: auto; margin: 0; }
    #domain-filters {
      display: inline-flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
    }
    #toolbar button {
      background: var(--accent);
      border: 1px solid transparent;
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s, border-color 0.2s;
    }
    #toolbar button:hover {
      background: #1a3a5c;
      border-color: var(--text-dim);
    }
    #toolbar button.primary { background: #0f3460; color: var(--on); }
    .lang-btn { min-width: 28px; padding: 4px 8px; font-size: 12px; }
    .lang-btn.active { background: var(--on); color: var(--bg); border-color: var(--on); }
    .toolbar-view-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid var(--on);
      background: transparent;
      color: var(--on);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .toolbar-view-link:hover {
      background: rgba(168, 230, 207, 0.15);
      color: var(--text);
    }
    /* Grid 3D (isometric) */
    #graph-container {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #grid-3d {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      transform: scaleY(0.866) rotateX(60deg) rotateZ(0deg);
      transform-style: preserve-3d;
      perspective: 1200px;
      pointer-events: none;
    }
    #cy {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    /* Sidebar */
    #sidebar {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      max-width: 90vw;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--accent);
      box-shadow: -4px 0 20px var(--shadow);
      z-index: 10;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      padding: 16px;
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--text);
      word-break: break-all;
    }
    #sidebar .state-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 13px;
      margin-bottom: 12px;
      transition: background-color 0.3s, color 0.3s;
    }
    #sidebar .state-badge.on  { background: var(--on); color: #1a1a2e; }
    #sidebar .state-badge.off { background: var(--off); color: #fff; }
    #sidebar .state-badge.unavailable { background: var(--unavailable); color: #fff; }
    #sidebar .attr-list { font-size: 13px; color: var(--text-dim); }
    #sidebar .attr-list dt { margin-top: 8px; }
    #sidebar .links-section { margin-top: 16px; }
    #sidebar .links-section h3 { font-size: 14px; margin-bottom: 8px; color: var(--text-dim); }
    #sidebar .links-section ul { margin: 0; padding-left: 20px; }
    #sidebar .sidebar-controls { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    #sidebar .sidebar-controls button {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    #sidebar .sidebar-controls button:hover { background: #1a3a5c; border-color: var(--text-dim); }
    #sidebar .sidebar-controls button.primary { background: var(--on); color: var(--bg); border-color: var(--on); }
    #sidebar .sidebar-controls button.primary:hover { opacity: 0.9; }
    #sidebar .entity-block {
      margin-top: 12px;
      padding: 10px;
      background: var(--accent);
      border-radius: 8px;
      font-size: 13px;
    }
    #sidebar .entity-block .entity-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    #sidebar .entity-block .entity-attr { margin-top: 6px; color: var(--text-dim); font-size: 12px; }
    #sidebar-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
    }
    #sidebar-close:hover { color: var(--text); }
    /* Auth panel */
    #auth-panel {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #auth-panel.hidden { display: none; }
    #auth-panel .card {
      background: var(--surface);
      padding: 24px;
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--accent);
    }
    #auth-panel label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-dim); }
    #auth-panel input {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text);
      margin-bottom: 16px;
    }
    #auth-panel input:focus { outline: none; border-color: var(--on); }
    #auth-panel button {
      width: 100%;
      padding: 10px;
      background: var(--on);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    #auth-panel button:hover { opacity: 0.9; }
    #auth-panel button.secondary { background: var(--accent); color: var(--text); }
    #auth-panel button.secondary:hover { background: #1a3a5c; }
    #auth-panel .hint { font-size: 12px; color: var(--text-dim); margin-top: 12px; }
    /* Status */
    #status {
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .status-ok { color: var(--on); }
    .status-err { color: var(--unavailable); }
    #progress-bar {
      height: 4px;
      background: var(--accent);
      width: 100%;
      margin-top: 4px;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar .fill {
      height: 100%;
      background: var(--on);
      border-radius: 2px;
      transition: width 0.25s ease;
      width: 0%;
    }
    #progress-text {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    /* Server integration sync indicator */
    .server-sync-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: var(--text);
      max-width: min(280px, 42vw);
      line-height: 1.25;
    }
    .server-sync-pill .server-sync-dot {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
    }
    .server-sync-pill .server-sync-label { overflow: hidden; text-overflow: ellipsis; }
    .server-sync--checking .server-sync-dot {
      background: var(--text-dim);
      animation: server-sync-pulse 1.1s ease-in-out infinite;
    }
    .server-sync--ok .server-sync-dot { background: var(--on); }
    .server-sync--ok { border-color: rgba(168, 230, 207, 0.45); color: var(--on); }
    .server-sync--api_only .server-sync-dot { background: #e8c547; }
    .server-sync--api_only { border-color: rgba(232, 197, 71, 0.5); color: #f5e6a6; }
    .server-sync--absent .server-sync-dot { background: var(--unavailable); }
    .server-sync--absent { border-color: rgba(233, 69, 96, 0.45); color: #ff9aab; }
    .server-sync--error .server-sync-dot { background: #c77dff; }
    .server-sync--error { border-color: rgba(199, 125, 255, 0.4); color: #e0c4ff; }
    @keyframes server-sync-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }
    #auth-panel .auth-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    #auth-panel .auth-head h2 { margin: 0; flex: 1; min-width: 0; }
    #auth-panel [data-server-sync-pill] { flex-shrink: 0; max-width: 160px; font-size: 11px; padding: 4px 10px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="auth-panel">
      <div class="card">
        <div class="auth-head">
          <h2 data-i18n="auth_title">HA Graph Explorer v2</h2>
          <span class="server-sync-pill server-sync--checking" data-server-sync-pill role="status" aria-live="polite">
            <span class="server-sync-dot" aria-hidden="true"></span>
            <span class="server-sync-label">…</span>
          </span>
        </div>
        <p style="color: var(--text-dim); font-size: 14px; margin-top:0;" data-i18n="auth_subtitle">Paste your token.</p>
        <label for="base-url-input" data-i18n="auth_baseUrl">Base URL (optional)</label>
        <input type="text" id="base-url-input" data-i18n-placeholder="auth_baseUrlPlaceholder" autocomplete="off">
        <p class="hint" style="margin-top:0;" data-i18n="auth_baseUrlHint">Laissez vide pour utiliser l’URL actuelle (ex. si ouvert depuis HA).</p>
        <label for="token-input" data-i18n="auth_token">Access token</label>
        <input type="password" id="token-input" data-i18n-placeholder="auth_tokenPlaceholder" autocomplete="off">
        <button type="button" id="auth-save" data-i18n="auth_save">Save and connect</button>
        <button type="button" id="auth-close" class="secondary" style="margin-left:8px;" data-i18n="auth_close">Close</button>
        <p class="hint" data-i18n="auth_tokenHint"></p>
        <p class="hint" style="margin-top:8px;" data-i18n="auth_serverSyncHint"></p>
        <hr style="border:none; border-top:1px solid var(--accent); margin:16px 0;">
        <p style="font-size:13px; color:var(--text-dim); margin-bottom:8px;" data-i18n="backup_heading"></p>
        <label style="display:block; margin-bottom:8px;"><input type="checkbox" id="export-include-token"> <span data-i18n="backup_includeToken">Include token</span></label>
        <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
          <button type="button" id="btn-export-backup" data-i18n="backup_export">Export backup</button>
          <button type="button" id="btn-import-backup" data-i18n="backup_import">Restore backup</button>
          <input type="file" id="import-backup-file" accept=".json,application/json" style="display:none;">
        </div>
      </div>
    </div>
    <div id="toolbar">
      <span id="lang-switcher" style="margin-right:4px;"><button type="button" class="lang-btn" data-lang="en">EN</button><button type="button" class="lang-btn" data-lang="fr">FR</button></span>
      <a href="ha-graph-3d.html" class="toolbar-view-link" style="margin-right:4px;" data-i18n="view_3d" data-i18n-title="view_3d_title">3D</a>
      <input type="text" id="search" data-i18n-placeholder="search_placeholder">
      <button type="button" id="btn-reset-layout" data-i18n-title="btn_reset_layout_title"><span data-i18n="btn_reset_layout">Reset layout</span></button>
      <button type="button" id="btn-center" data-i18n-title="btn_center_title"><span data-i18n="btn_center">Center</span></button>
      <label><input type="checkbox" id="orphans"> <span data-i18n="orphans_label">Show orphans</span></label>
      <span id="domain-filters"></span>
      <button type="button" id="btn-backup" data-i18n-title="btn_backup_title"><span data-i18n="btn_backup">Backup</span></button>
      <span style="margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
        <span class="server-sync-pill server-sync--checking" data-server-sync-pill role="status" aria-live="polite">
          <span class="server-sync-dot" aria-hidden="true"></span>
          <span class="server-sync-label">…</span>
        </span>
        <span id="status" data-i18n="status_disconnected">Disconnected</span>
        <div id="progress-bar" style="display:none; width:160px;"><div class="fill"></div></div>
        <span id="progress-text"></span>
      </span>
    </div>
    <div id="graph-container">
      <div id="grid-3d"></div>
      <div id="cy"></div>
    </div>
    <aside id="sidebar">
      <button type="button" id="sidebar-close" aria-label="Close" data-i18n-aria="close_aria">&times;</button>
      <div id="sidebar-content"></div>
    </aside>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <script src="https://unpkg.com/webcola/WebCola/cola.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola@2.4.0/cytoscape-cola.min.js"></script>
  <script>
(function () {
  'use strict';

  // Sources de données (le backend HA lit les .storage et expose via WebSocket) :
  // .storage/core.device_registry  → config/device_registry/list
  // .storage/core.entity_registry   → config/entity_registry/list
  // .storage/automations (ou YAML)  → automation/config { entity_id } par automation
  // .storage/scripts (ou YAML)     → script/config { entity_id } par script (si exposé)
  // .storage/scenes (ou YAML)      → get_states (entités scene.*) + attributs entity_id/entities
  // On n'a pas accès direct aux fichiers .storage ; on utilise ces API.

  const STORAGE_TOKEN = 'ha_graph_token';
  const STORAGE_LAYOUT_2D = 'ha_graph_layout_2d';
  const STORAGE_LAYOUT_3D = 'ha_graph_layout_3d';
  const STORAGE_LAYOUT_LEGACY = 'ha_graph_layout';

  function layoutObjectHasKeys(obj) {
    return obj && typeof obj === 'object' && Object.keys(obj).length > 0;
  }

  function readStoredLayoutRaw(storageKey) {
    try {
      const raw = localStorage.getItem(storageKey);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  function layoutTo2d(layoutObj) {
    if (!layoutObj || typeof layoutObj !== 'object') return {};
    const o = {};
    Object.keys(layoutObj).forEach(id => {
      const p = layoutObj[id];
      if (p && Number.isFinite(Number(p.x)) && Number.isFinite(Number(p.y))) {
        o[id] = { x: Number(p.x), y: Number(p.y) };
      }
    });
    return o;
  }

  /** Une fois au chargement : si seule la clé legacy existe, on la duplique en 2D+3D ; sinon on ne remplit jamais une dimension vide à partir du legacy si l’autre a déjà des positions (évite de recoller le 2D sur d’anciennes données quand le 3D a évolué). */
  function ensureLayoutsMigratedFromLegacy() {
    try {
      const legacy = readStoredLayoutRaw(STORAGE_LAYOUT_LEGACY);
      if (!layoutObjectHasKeys(legacy)) return;
      const l2 = readStoredLayoutRaw(STORAGE_LAYOUT_2D);
      const l3 = readStoredLayoutRaw(STORAGE_LAYOUT_3D);
      const has2 = layoutObjectHasKeys(l2);
      const has3 = layoutObjectHasKeys(l3);
      if (!has2 && !has3) {
        localStorage.setItem(STORAGE_LAYOUT_3D, JSON.stringify(legacy));
        localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(layoutTo2d(legacy)));
      }
    } catch (e) { /* ignore */ }
  }

  function applyServerLayoutsToLocalStorage(data) {
    if (!data || typeof data !== 'object') return;
    try {
      if (data.layout_2d != null) localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(data.layout_2d));
      if (data.layout_3d != null) localStorage.setItem(STORAGE_LAYOUT_3D, JSON.stringify(data.layout_3d));
      if (data.layout != null && data.layout_2d == null && data.layout_3d == null) {
        localStorage.setItem(STORAGE_LAYOUT_3D, JSON.stringify(data.layout));
        localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(layoutTo2d(data.layout)));
      }
    } catch (e) { /* ignore */ }
  }
  const STORAGE_BASE = 'ha_graph_base';
  const STORAGE_LANG = 'ha_graph_lang';

  const L10N = {
    en: {

      auth_serverSyncHint: 'With the ha_graph_explorer integration enabled, token and layout are saved on your HA server after connect and reused on other devices (same HA user / session).',
      backup_heading: 'Backup (so you don\'t lose settings when changing device or clearing cache)',
      backup_includeToken: 'Include token in file',
      backup_export: 'Export backup',
      backup_import: 'Restore backup',
      search_placeholder: 'Search (entity_id or name)...',
      btn_reset_layout: 'Reset layout',
      btn_reset_layout_title: 'Re-apply force-directed layout',
      btn_center: 'Center',
      btn_center_title: 'Center view on all nodes',
      orphans_label: 'Show orphans',

      view_3d_title: 'Open the 3D graph (WebGL, d3-force-3d)',

      status_disconnected: 'Disconnected',
      status_connected: 'Connected',

      status_connected_nodes: 'Connected ({n} nodes)',
      status_error: 'Error: {msg}',

      progress_entities_devices: 'Entities: {entities} | Devices: {devices}',
      progress_building: 'Building graph (devices)...',

      progress_devices: 'Devices: {current}/{total}',
      progress_nodes_devices: 'Device nodes...',
      progress_automations_scripts: 'Automation / script / group nodes...',
      progress_links: 'Links (groups / scenes)...',
      progress_automations_search: 'Fetching automations / scripts...',
      links_title: 'Links ({n})',

    },
    fr: {

      auth_subtitle: 'Collez votre token d\'accès long durée Home Assistant.',
      auth_baseUrl: 'URL de base (optionnel)',
      auth_baseUrlPlaceholder: 'https://homeassistant.local:8123',
      auth_baseUrlHint: 'Laissez vide pour utiliser l\'URL actuelle (ex. si ouvert depuis HA).',
      auth_token: 'Token d\'accès',
      auth_tokenPlaceholder: 'eyJhbGc...',
      auth_save: 'Enregistrer et se connecter',
      auth_close: 'Fermer',
      auth_tokenHint: 'Profil HA → Sécurité → Tokens d\'accès → Créer un token.',

  async function refreshServerSyncIndicator() {
    updateServerSyncPill('checking');
    try {
      const r0 = await fetch(API_CONFIG_URL, {
        method: 'GET',
        credentials: 'same-origin',
        headers: { Accept: 'application/json' }
      });
      if (r0.status === 404) {
        updateServerSyncPill('absent');
        return;
      }
      const auth = getEffectiveAuthToken();
      if (auth) {
        const r1 = await fetch(API_CONFIG_URL, {
          method: 'GET',
          credentials: 'same-origin',
          headers: { Authorization: 'Bearer ' + auth, Accept: 'application/json' }
        });
        if (r1.ok) {
          updateServerSyncPill('ok');
          return;
        }
      }
      if (r0.status === 401 || r0.status === 403) {
        updateServerSyncPill('api_only');
        return;
      }
      updateServerSyncPill('error');
    } catch (e) {
      updateServerSyncPill('error');
    }
  }

  function getHassAccessTokenFromBrowser() {
    try {
      const keys = ['hassTokens', 'hass_auth', 'ha_tokens'];
      for (let i = 0; i < keys.length; i++) {
        const raw = localStorage.getItem(keys[i]);
        if (!raw) continue;
        const parsed = JSON.parse(raw);
        const t = parsed.access_token || parsed.accessToken;
        if (typeof t === 'string' && t.length > 0) return t;
      }
    } catch (e) { /* ignore */ }
    return '';
  }

  function getEffectiveAuthToken() {
    return getToken() || getHassAccessTokenFromBrowser();
  }

  async function pushServerConfig(patch) {
    const auth = getEffectiveAuthToken();
    if (!auth) return;
    const r = await fetch(API_CONFIG_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + auth
      },
      credentials: 'same-origin',
      body: JSON.stringify(patch)
    });
    if (!r.ok) throw new Error('config save ' + r.status);
  }

  async function syncFromServer() {
    try {
      /* 1) Session HA (cookie) — même sans token graphe / OAuth dans localStorage (autre URL ou navigateur). */
      let r = await fetch(API_CONFIG_URL, {
        credentials: 'same-origin',
        headers: { Accept: 'application/json' }
      });
      if (r.status === 404) return;
      if (!r.ok) {
        const auth = getEffectiveAuthToken();
        if (!auth) return;
        if (r.status !== 401 && r.status !== 403) return;
        r = await fetch(API_CONFIG_URL, {
          credentials: 'same-origin',
          headers: {
            Authorization: 'Bearer ' + auth,
            Accept: 'application/json'
          }
        });
      }
      if (r.status === 404) return;
      if (!r.ok) return;
      const data = await r.json();
      if (data.base_url) setBaseUrl(String(data.base_url).replace(/\/$/, ''));
      if (data.token) setToken(String(data.token).trim());
      applyServerLayoutsToLocalStorage(data);
      const baseInput = document.getElementById('base-url-input');
      if (baseInput) baseInput.value = getBaseUrl();
    } catch (e) { /* integration missing or network */ }
  }

  function wsConnect() {
    baseUrl = getBaseUrl();
    const token = getToken();
    if (!token) {
      showAuth(true);
      return;
    }
    const wsUrl = (baseUrl.replace(/^http/, 'ws') + '/api/websocket').replace('//api', '/api');
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      setStatus(t('status_loading'), true);
    };
    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'auth_required') {
        ws.send(JSON.stringify({ type: 'auth', access_token: token }));
        return;
      }
      if (msg.type === 'auth_ok') {
        setStatus(t('status_connected'), true);
        loadData();
        subscribeStateChanged();
        return;
      }
      if (msg.type === 'auth_invalid') {
        setStatus(t('status_invalid_token'), false);
        showAuth(true);
        return;
      }
      if (msg.type === 'result') {
        const pending = window.__haWsPending && window.__haWsPending[msg.id];
        if (pending) {
          clearTimeout(pending.timer);
          delete window.__haWsPending[msg.id];
          if (msg.success !== false) pending.resolve(msg.result);
          else pending.reject(new Error(msg.error?.message || msg.error?.code || 'Erreur WS'));
        }
        return;
      }
      if (msg.type === 'event' && msg.event?.event_type === 'state_changed') {
        const d = msg.event.data;
        if (d.entity_id && d.new_state) {
          states[d.entity_id] = d.new_state;
          updateNodeState(d.entity_id, d.new_state);
        }
      }
    };
    ws.onclose = () => {
      setStatus(t('status_disconnected'), false);
      wsReconnectTimer = setTimeout(wsConnect, 3000);
    };
    ws.onerror = () => {};
  }

  function wsSend(type, extra = {}) {
    return new Promise((resolve, reject) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        reject(new Error('WebSocket non connecté'));
        return;
      }
      const id = ++wsMessageId;
      if (!window.__haWsPending) window.__haWsPending = {};
      const timer = setTimeout(() => {
        if (window.__haWsPending && window.__haWsPending[id]) {
          delete window.__haWsPending[id];
          reject(new Error('Timeout'));
        }
      }, 20000);
      window.__haWsPending[id] = { resolve, reject, timer };
      ws.send(JSON.stringify({ id, type, ...extra }));
    });
  }

  function callService(domain, service, serviceData = {}) {

  function loadData() {

      wsSend('get_states'),
      wsSend('config/device_registry/list').catch(() => []),
      wsSend('config/entity_registry/list').catch(() => [])
    ]).then(([statesResult, devices, entitiesRaw]) => {
      const list = statesResult || [];
      const rawDevices = devices || [];
      deviceRegistry = Array.isArray(rawDevices) ? rawDevices : (rawDevices.devices || []);
      const entities = Array.isArray(entitiesRaw) ? entitiesRaw : (entitiesRaw && entitiesRaw.length !== undefined ? entitiesRaw : []);
      setProgress(true, 15, t('progress_entities_devices', { entities: list.length, devices: deviceRegistry.length }));
      states = list.reduce((acc, s) => {
        acc[s.entity_id] = s;
        return acc;
      }, {});
      entityToDevice = {};
      deviceToEntities = {};
      entities.forEach(ent => {
        const eid = ent.entity_id;
        const did = ent.device_id;
        if (eid && did) {
          entityToDevice[eid] = did;
          if (!deviceToEntities[did]) deviceToEntities[did] = [];
          deviceToEntities[did].push(eid);
        }
      });
      Object.keys(states).forEach(eid => {
        const did = entityToDevice[eid];
        if (did && (!deviceToEntities[did] || !deviceToEntities[did].includes(eid))) {
          if (!deviceToEntities[did]) deviceToEntities[did] = [];
          deviceToEntities[did].push(eid);
        }
      });
      setProgress(true, 25, t('progress_building'));
      return buildGraphFromDevices();
    }).then(() => {
      setProgress(true, 85, t('progress_rendering', { nodes: graphData.nodes.length, edges: graphData.edges.length }));

      loadLayoutFromStorage();

    }).catch(err => {
      setProgress(false);
      setStatus(t('status_error', { msg: err.message || err }), false);
    });
  }

  function entityDomain(entityId) {
    const i = entityId.indexOf('.');
    return i > 0 ? entityId.slice(0, i) : '';
  }

  function getEntityIdsFromAttributes(attrs) {
    if (!attrs) return [];
    let list = attrs.entity_id || attrs.entities || attrs.members;
    if (typeof list === 'string') list = [list];
    if (!Array.isArray(list)) return [];
    return list.filter(id => typeof id === 'string' && id.includes('.'));
  }

  function parseAutomationScriptConfig(config) {
    const entityIds = new Set();
    const deviceIds = new Set();
    if (!config) return { entityIds, deviceIds };
    const addEntity = (v) => {
      if (typeof v === 'string' && v.includes('.')) entityIds.add(v);
      if (Array.isArray(v)) v.forEach(addEntity);
    };
    const addDevice = (v) => {
      if (typeof v === 'string' && v.length > 10) deviceIds.add(v);
      if (Array.isArray(v)) v.forEach(addDevice);
    };
    const walk = (obj) => {
      if (!obj || typeof obj !== 'object') return;
      if (obj.entity_id) addEntity(obj.entity_id);
      if (obj.entity) addEntity(obj.entity);
      if (obj.entities) addEntity(obj.entities);
      if (obj.device_id) addDevice(obj.device_id);
      if (obj.data?.entity_id) addEntity(obj.data.entity_id);
      if (obj.data?.device_id) addDevice(obj.data.device_id);
      if (obj.service_data?.entity_id) addEntity(obj.service_data.entity_id);
      if (obj.service_data?.device_id) addDevice(obj.service_data.device_id);
      if (obj.target?.entity_id) addEntity(obj.target.entity_id);
      if (obj.target?.device_id) addDevice(obj.target.device_id);
      if (obj.event_data?.entity_id) addEntity(obj.event_data.entity_id);
      if (obj.data?.entity_id) addEntity(obj.data.entity_id);
      if (obj.data?.device_id) addDevice(obj.data.device_id);
      if (obj.trigger) (Array.isArray(obj.trigger) ? obj.trigger : [obj.trigger]).forEach(walk);
      if (obj.triggers) (Array.isArray(obj.triggers) ? obj.triggers : [obj.triggers]).forEach(walk);
      if (obj.action) (Array.isArray(obj.action) ? obj.action : [obj.action]).forEach(walk);
      if (obj.actions) (Array.isArray(obj.actions) ? obj.actions : [obj.actions]).forEach(walk);
      if (obj.condition) (Array.isArray(obj.condition) ? obj.condition : [obj.condition]).forEach(walk);
      if (obj.conditions) (Array.isArray(obj.conditions) ? obj.conditions : [obj.conditions]).forEach(walk);
      if (obj.sequence) (Array.isArray(obj.sequence) ? obj.sequence : [obj.sequence]).forEach(walk);
      if (obj.repeat) walk(obj.repeat);
      if (obj.choose) {
        const choose = Array.isArray(obj.choose) ? obj.choose : [obj.choose];
        choose.forEach(branch => {
          if (branch && typeof branch === 'object') {
            if (Array.isArray(branch.conditions)) branch.conditions.forEach(walk);
            if (branch.sequence) (Array.isArray(branch.sequence) ? branch.sequence : [branch.sequence]).forEach(walk);
          }
        });
      }
      if (obj.default) walk(obj.default);
      if (obj.if) (Array.isArray(obj.if) ? obj.if : [obj.if]).forEach(walk);
      if (obj.then) (Array.isArray(obj.then) ? obj.then : [obj.then]).forEach(walk);
      if (obj.else) (Array.isArray(obj.else) ? obj.else : [obj.else]).forEach(walk);
      if (obj.wait_for_trigger) (Array.isArray(obj.wait_for_trigger) ? obj.wait_for_trigger : [obj.wait_for_trigger]).forEach(walk);
      if (Array.isArray(obj)) obj.forEach(walk);
      else Object.values(obj).forEach(walk);
    };
    walk(config);
    return { entityIds, deviceIds };
  }

  function entityToNodeId(entityOrDeviceId) {
    if (!entityOrDeviceId || typeof entityOrDeviceId !== 'string') return null;
    if (!entityOrDeviceId.includes('.')) return entityOrDeviceId;
    const domain = entityDomain(entityOrDeviceId);
    if (VIRTUAL_DOMAINS.has(domain)) return entityOrDeviceId;
    return entityToDevice[entityOrDeviceId] || entityOrDeviceId;
  }

  function deviceAggregatedState(deviceId) {
    const eids = deviceToEntities[deviceId];
    if (!eids || !eids.length) return 'off';
    let hasOn = false, hasUnavail = false;
    eids.forEach(eid => {
      const s = states[eid];
      if (!s) return;
      if (s.state === 'unavailable') hasUnavail = true;
      else if (s.state === 'on') hasOn = true;
    });
    if (hasUnavail && !hasOn && eids.every(eid => (states[eid] || {}).state === 'unavailable')) return 'unavailable';
    return hasOn ? 'on' : 'off';
  }

  function buildGraphFromDevices() {
    const nodeIds = new Set();
    const nodes = [];
    const entityEdges = [];

    setProgress(true, 30, t('progress_nodes_devices'));
    deviceRegistry.forEach((dev, i) => {
      if (i % 100 === 0 && deviceRegistry.length > 100) setProgress(true, 30 + (i / deviceRegistry.length) * 20, t('progress_devices', { current: i + 1, total: deviceRegistry.length }));
      const id = dev.id;
      const name = dev.name_by_user || dev.name || 'Sans nom';
      const state = deviceAggregatedState(id);
      nodeIds.add(id);
      nodes.push({
        id,
        domain: 'device',
        label: name,
        icon: '📟',
        state,
        attributes: { device_id: id },
        entityIds: deviceToEntities[id] || []
      });
    });

    setProgress(true, 52, t('progress_automations_scripts'));
    Object.keys(states).forEach(entityId => {
      const domain = entityDomain(entityId);
      if (!VIRTUAL_DOMAINS.has(domain)) return;
      const s = states[entityId];
      const name = (s.attributes && s.attributes.friendly_name) || entityId;
      nodeIds.add(entityId);
      nodes.push({
        id: entityId,
        domain,
        label: name,
        icon: DOMAIN_EMOJI[domain] || '⬤',
        state: s.state,
        attributes: s.attributes || {},
        entityIds: [entityId]
      });
    });

    setProgress(true, 58, t('progress_links'));
    Object.values(states).forEach(s => {
      const domain = entityDomain(s.entity_id);
      const attrs = s.attributes || {};
      if (domain === 'group' || domain === 'zone') {
        getEntityIdsFromAttributes(attrs).forEach(tid => {
          entityEdges.push({ source: s.entity_id, target: tid, type: 'member' });
        });
      }
      if (domain === 'scene') {
        getEntityIdsFromAttributes(attrs).forEach(tid => {
          entityEdges.push({ source: s.entity_id, target: tid, type: 'target' });
        });
      }
    });

    setProgress(true, 62, t('progress_automations_search'));
    return tryFetchAutomationScriptEdges(entityEdges, new Set(Object.keys(states))).then(() => {
      entityEdges.forEach(({ target: tgtE }) => {
        const tgtN = entityToNodeId(tgtE);
        if (tgtN && !nodeIds.has(tgtN) && states[tgtN]) {
          nodeIds.add(tgtN);
          const s = states[tgtN];
          const domain = entityDomain(tgtN);
          nodes.push({
            id: tgtN,
            domain,
            label: (s.attributes && s.attributes.friendly_name) || tgtN,
            icon: DOMAIN_EMOJI[domain] || '⬤',
            state: s.state,
            attributes: s.attributes || {},
            entityIds: [tgtN]
          });
        }
      });
      const edgeKeys = new Set();
      const edges = [];
      entityEdges.forEach(({ source: srcE, target: tgtE, type }) => {
        const srcN = entityToNodeId(srcE);
        const tgtN = entityToNodeId(tgtE);
        if (srcN && tgtN && srcN !== tgtN && nodeIds.has(srcN) && nodeIds.has(tgtN)) {
          const key = srcN + '|' + tgtN + '|' + type;
          if (!edgeKeys.has(key)) {
            edgeKeys.add(key);
            edges.push({ source: srcN, target: tgtN, type });
          }
        }
      });
      graphData = { nodes, edges };
    });
  }

  function tryFetchAutomationScriptEdges(edges, knownIds) {
    const automationEntityIds = Object.keys(states).filter(k => k.startsWith('automation.'));
    const scriptEntityIds = Object.keys(states).filter(k => k.startsWith('script.'));

    function addEdgesFromConfig(sourceEid, config, edgeType) {
      if (!config || typeof config !== 'object') return;
      const { entityIds: ids, deviceIds: dids } = parseAutomationScriptConfig(config);
      ids.forEach(tid => {
        if (knownIds.has(tid)) edges.push({ source: sourceEid, target: tid, type: edgeType });
      });
      dids.forEach(did => {
        edges.push({ source: sourceEid, target: did, type: edgeType });
      });
    }

    function runInBatches(arr, batchSize, fn) {
      let p = Promise.resolve();
      for (let i = 0; i < arr.length; i += batchSize) {
        const batch = arr.slice(i, i + batchSize);
        p = p.then(() => Promise.all(batch.map(fn)));
      }
      return p;
    }

    const p1 = runInBatches(automationEntityIds, 5, (entityId) =>
      wsSend('automation/config', { entity_id: entityId })
        .then(result => {
          const config = result && (result.config !== undefined ? result.config : result);
          addEdgesFromConfig(entityId, config, 'trigger');
        })
        .catch(() => {})
    );
    const p2 = runInBatches(scriptEntityIds, 5, (entityId) =>
      wsSend('script/config', { entity_id: entityId })
        .then(result => {
          const config = result && (result.config !== undefined ? result.config : result);
          addEdgesFromConfig(entityId, config, 'action');
        })
        .catch(() => {})
    );
    return Promise.all([p1, p2]);
  }

  function nodeColor(state) {
    if (state === 'unavailable') return '#e94560';
    if (state === 'on') return '#a8e6cf';
    return '#6c757d';
  }

  function renderGraph() {
    const container = document.getElementById('cy');
    if (cy) cy.destroy();

    const elements = [
      ...graphData.nodes.map(n => ({
        data: {
          id: n.id,
          label: n.label,
          domain: n.domain,
          state: n.state,
          icon: n.icon || DOMAIN_EMOJI[n.domain] || '⬤',
          faIcon: DOMAIN_ICONS[n.domain] || 'fa-circle'
        },
        classes: n.state === 'unavailable' ? 'unavailable' : (n.state === 'on' ? 'on' : 'off')
      })),
      ...graphData.edges.map((e, i) => ({
        data: {
          id: 'e' + i,
          source: e.source,
          target: e.target,
          type: e.type || 'member'
        }
      }))
    ];

    cy = cytoscape({
      container,
      elements,
      style: [
        {
          selector: 'node',
          style: {
            'label': (ele) => {
              const icon = ele.data('icon') || '⬤';
              const name = ele.data('label') || '';
              return name ? icon + '\n' + name : icon;
            },
            'text-valign': 'bottom',
            'text-halign': 'center',
            'font-size': '10px',
            'color': '#e8e8e8',
            'text-margin-y': 8,
            'width': 52,
            'height': 52,
            'background-color': '#6c757d',
            'border-width': 2,
            'border-color': '#16213e',
            'transition-duration': '0.3s',
            'transition-property': 'background-color, border-color',
            'text-wrap': 'wrap',
            'text-max-width': '160px',
            'overlay-color': 'rgba(0,0,0,0.25)',
            'overlay-padding': 2,
            'overlay-opacity': 0
          }
        },
        { selector: 'node[domain="script"]', style: { 'shape': 'rectangle' } },
        { selector: 'node[domain="automation"]', style: { 'shape': 'diamond' } },
        { selector: 'node[domain="scene"]', style: { 'shape': 'triangle' } },
        { selector: 'node:selected', style: { 'overlay-opacity': 0.5 } },
        { selector: 'node.highlight', style: { 'overlay-opacity': 0.3 } },
        { selector: 'node.on', style: { 'background-color': '#a8e6cf', 'border-color': '#7bc99a' } },
        { selector: 'node.off', style: { 'background-color': '#6c757d', 'border-color': '#5a6268' } },
        { selector: 'node.unavailable', style: { 'background-color': '#e94560', 'border-color': '#c73e54' } },
        { selector: 'node.highlight', style: { 'border-width': 4, 'border-color': '#ffecd2' } },
        { selector: 'node.dim', style: { 'opacity': 0.25 } },
        { selector: 'node.hidden', style: { 'display': 'none' } },
        { selector: 'node.orphan', style: { 'border-width': 4, 'border-color': '#ff9a8b' } },
        { selector: 'edge.hidden', style: { 'display': 'none' } },
        {
          selector: 'edge',
          style: {
            'width': 1.5,
            'line-color': '#a8e6cf',
            'target-arrow-color': '#a8e6cf',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'transition-duration': '0.3s',
            'opacity': 0.55
          }
        },
        { selector: 'edge[type="trigger"]', style: { 'line-color': '#ff9a8b', 'target-arrow-color': '#ff9a8b' } },
        { selector: 'edge[type="action"]', style: { 'line-color': '#ffecd2', 'target-arrow-color': '#ffecd2' } },
        { selector: 'edge[type="member"]', style: { 'line-color': '#a8e6cf', 'target-arrow-color': '#a8e6cf' } },
        { selector: 'edge[type="target"]', style: { 'line-color': '#d4a5a5', 'target-arrow-color': '#d4a5a5' } },
        { selector: 'edge.highlight', style: { 'width': 4 } },
        { selector: 'edge.dim', style: { 'opacity': 0.2 } }
      ],
      layout: { name: 'preset' },
      minZoom: 0.05,
      maxZoom: 5,
      wheelSensitivity: 0.3
    });

    cy.on('tap', 'node', evt => {
      const node = evt.target;
      openSidebar(node.data('id'));
    });
    cy.on('mouseover', 'node', evt => {
      const node = evt.target;
      const neighborhood = node.neighborhood();
      cy.elements().addClass('dim');
      neighborhood.removeClass('dim').addClass('highlight');
    });
    cy.on('mouseout', 'node', () => {
      cy.elements().removeClass('dim highlight');
    });
    cy.on('drag', 'node', () => saveLayoutToStorage());

    document.getElementById('btn-reset-layout').onclick = () => {
      if (!confirm(t('reset_layout_confirm'))) return;
      applyColaLayout();
    };
    document.getElementById('btn-center').onclick = () => {
      if (cy && cy.nodes().length > 0) cy.fit(50);
    };
    document.getElementById('sidebar-close').onclick = () => closeSidebar();
    document.getElementById('search').oninput = onSearchInput;
    document.getElementById('orphans').onchange = toggleOrphans;
    document.getElementById('sidebar-content').addEventListener('click', (e) => {
      const btn = e.target.closest('button.ha-control');
      if (!btn) return;
      const entityId = btn.dataset.entityId;
      const domain = btn.dataset.domain;
      const service = btn.dataset.service;
      if (!entityId || !domain || !service) return;
      btn.disabled = true;
      callService(domain, service, { entity_id: entityId })
        .then(() => { setTimeout(() => { if (currentSidebarNodeId) openSidebar(currentSidebarNodeId); }, 400); })
        .catch(() => {})
        .finally(() => { btn.disabled = false; });
    });
    buildDomainFilters();
  }

  function buildDomainFilters() {
    const container = document.getElementById('domain-filters');
    container.innerHTML = DOMAINS.map(d => `
      <label title="${d.label}">
        <input type="checkbox" class="domain-filter" data-domain="${d.id}" checked> <i class="fa ${d.icon}"></i>
      </label>
    `).join('');
    container.querySelectorAll('.domain-filter').forEach(cb => {
      cb.addEventListener('change', () => filterByDomains());
    });
  }

  function filterByDomains() {
    const checked = new Set(
      Array.from(document.querySelectorAll('.domain-filter:checked')).map(c => c.dataset.domain)
    );
    if (!cy) return;
    cy.nodes().forEach(n => {
      const domain = n.data('domain');
      n.toggleClass('hidden', !checked.has(domain));
    });
    cy.edges().forEach(e => {
      const src = e.source().hasClass('hidden');
      const tgt = e.target().hasClass('hidden');
      e.toggleClass('hidden', src || tgt);
    });
  }

  function toggleOrphans() {
    const show = document.getElementById('orphans').checked;
    if (!cy) return;
    const withEdges = new Set();
    cy.edges().forEach(ed => {
      withEdges.add(ed.source().id());
      withEdges.add(ed.target().id());
    });
    cy.nodes().forEach(n => {
      n.toggleClass('orphan', show && !withEdges.has(n.id()));
    });
  }

  function onSearchInput() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    if (!cy || !q) {
      cy?.elements().removeClass('dim highlight');
      return;
    }
    const match = n => {
      const id = (n.data('id') || '').toLowerCase();
      const label = (n.data('label') || '').toLowerCase();
      return id.includes(q) || label.includes(q);
    };
    cy.elements().addClass('dim');
    cy.nodes().filter(match).removeClass('dim').addClass('highlight');
    cy.nodes().filter(match).connectedEdges().removeClass('dim');
    const first = cy.nodes().filter(match).first();
    if (first.length) {
      cy.animate({ center: { eles: first }, zoom: 1.5 }, { duration: 300 });
    }
  }

  let currentSidebarNodeId = null;

  function getEntityDomain(entityId) {
    const i = (entityId || '').indexOf('.');
    return i > 0 ? entityId.slice(0, i) : '';
  }

  function entityControlButtons(entityId) {
    const domain = getEntityDomain(entityId);
    const s = states[entityId];
    const st = s ? s.state : '';
    if (st === 'unavailable') return '';
    const e = (d, svc, label, primary) => `<button type="button" class="ha-control ${primary ? 'primary' : ''}" data-entity-id="${escapeHtml(entityId)}" data-domain="${escapeHtml(d)}" data-service="${escapeHtml(svc)}">${escapeHtml(label)}</button>`;
    if (domain === 'script') return `<div class="sidebar-controls">${e('script', 'turn_on', t('btn_run'), true)}</div>`;
    if (domain === 'automation') {
      return `<div class="sidebar-controls">${e('automation', 'trigger', t('btn_trigger'), true)} ${e('automation', 'turn_on', t('btn_enable'), false)} ${e('automation', 'turn_off', t('btn_disable'), false)}</div>`;
    }
    if (domain === 'scene') return `<div class="sidebar-controls">${e('scene', 'turn_on', t('btn_enable'), true)}</div>`;
    if (domain === 'light' || domain === 'switch' || domain === 'fan' || domain === 'input_boolean') {
      return `<div class="sidebar-controls">${e(domain, 'turn_on', t('on'))} ${e(domain, 'turn_off', t('off'))}</div>`;
    }
    if (domain === 'cover') {
      return `<div class="sidebar-controls">${e('cover', 'open_cover', t('btn_open'))} ${e('cover', 'close_cover', t('btn_close_cover'))} ${e('cover', 'stop_cover', t('btn_stop'))}</div>`;
    }
    if (domain === 'lock') {
      return `<div class="sidebar-controls">${e('lock', 'lock', t('btn_lock'))} ${e('lock', 'unlock', t('btn_unlock'))}</div>`;
    }
    return '';
  }

  function entityAttributesHtml(s) {
    if (!s) return '';
    const attrs = s.attributes || {};
    const show = ['unit_of_measurement', 'current_temperature', 'temperature', 'humidity', 'battery_level', 'brightness', 'current', 'voltage', 'power', 'device_class'];
    const lines = [];
    if (s.state !== undefined && s.state !== null) {
      const u = attrs.unit_of_measurement ? ` ${attrs.unit_of_measurement}` : '';
      lines.push(t('attr_state') + ': ' + s.state + u);
    }
    show.forEach(k => { if (k !== 'unit_of_measurement' && attrs[k] !== undefined) lines.push(`${k}: ${attrs[k]}`); });
    return lines.length ? `<div class="entity-attr">${lines.map(l => escapeHtml(l)).join(' · ')}</div>` : '';
  }

  function openSidebar(nodeId) {
    currentSidebarNodeId = nodeId;
    const content = document.getElementById('sidebar-content');
    const links = graphData.edges.filter(e => e.source === nodeId || e.target === nodeId);
    const out = links.filter(e => e.source === nodeId);
    const inc = links.filter(e => e.target === nodeId);
    const node = graphData.nodes.find(n => n.id === nodeId);
    const linkLabel = (id) => (graphData.nodes.find(n => n.id === id) || {}).label || id;
    const linksHtml = `
      <div class="links-section">
        <h3>${t('links_title', { n: links.length })}</h3>
        <ul>
          ${out.map(e => `<li>→ ${escapeHtml(linkLabel(e.target))} (${e.type})</li>`).join('')}
          ${inc.map(e => `<li>← ${escapeHtml(linkLabel(e.source))} (${e.type})</li>`).join('')}
        </ul>
      </div>`;

    if (!node) {
      content.innerHTML = '<p>' + t('node_unknown') + '</p>';
      document.getElementById('sidebar').classList.add('open');
      return;
    }

    if (node.domain === 'device') {
      const entityIds = node.entityIds || [];
      const entityBlocks = entityIds.map(eid => {
        const s = states[eid];
        const name = (s && s.attributes && s.attributes.friendly_name) || eid;
        const st = s ? s.state : '?';
        const badgeClass = st === 'unavailable' ? 'unavailable' : (st === 'on' ? 'on' : 'off');
        const attrs = entityAttributesHtml(s);
        const ctrl = entityControlButtons(eid);
        return `<div class="entity-block">
          <div class="entity-head">
            <span><span class="state-badge ${badgeClass}" style="font-size:10px;">${escapeHtml(st)}</span> ${escapeHtml(name)}</span>
          </div>
          <code style="font-size:10px;color:var(--text-dim);">${escapeHtml(eid)}</code>
          ${attrs}
          ${ctrl}
        </div>`;
      }).join('');
      content.innerHTML = `
        <h2>${escapeHtml(node.label)}</h2>
        <div class="state-badge ${node.state === 'unavailable' ? 'unavailable' : (node.state === 'on' ? 'on' : 'off')}">${escapeHtml(node.state)}</div>
        <p style="font-size:12px;color:var(--text-dim);">${t('device_entities_count', { n: entityIds.length })}</p>
        <div class="links-section"><h3>${t('controls_sensors')}</h3></div>
        ${entityBlocks || '<p style="font-size:13px;color:var(--text-dim);">' + t('no_entities') + '</p>'}
        ${linksHtml}
      `;
    } else {
      const s = states[nodeId];
      const name = node.label;
      const st = s ? s.state : node.state;
      const badgeClass = st === 'unavailable' ? 'unavailable' : (st === 'on' ? 'on' : 'off');
      const attrs = entityAttributesHtml(s);
      const ctrl = entityControlButtons(nodeId);
      content.innerHTML = `
        <h2>${escapeHtml(name)}</h2>
        <div class="state-badge ${badgeClass}">${escapeHtml(st)}</div>
        <p style="font-size:12px;color:var(--text-dim);">${escapeHtml(nodeId)}</p>
        ${attrs}
        ${ctrl}
        ${linksHtml}
      `;
    }
    document.getElementById('sidebar').classList.add('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function updateNodeState(entityId, newState) {
    if (!cy) return;
    const nodeId = entityToNodeId(entityId);
    if (!nodeId) return;
    const node = cy.getElementById(nodeId);
    if (node.length) {
      const state = nodeId === entityId ? newState.state : deviceAggregatedState(nodeId);
      node.data('state', state);
      node.removeClass('on off unavailable').addClass(
        state === 'unavailable' ? 'unavailable' : (state === 'on' ? 'on' : 'off')
      );
    }
  }

  function subscribeStateChanged() {
    wsSend('subscribe_events', { event_type: 'state_changed' }).catch(() => {});
  }

  function getStoredLayout() {
    return readStoredLayoutRaw(STORAGE_LAYOUT_2D);
  }

  function saveLayoutToStorage() {
    if (!cy) return;
    const pos = {};
    cy.nodes().forEach(n => {
      const p = n.position();
      pos[n.id()] = { x: p.x, y: p.y };
    });
    localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(pos));
    schedulePushLayoutToServer(pos);
  }

  function loadLayoutFromStorage() {
    const pos = getStoredLayout();
    if (layoutObjectHasKeys(pos) && cy) {
      cy.nodes().forEach(n => {
        const p = pos[n.id()];
        if (p) n.position(p);
      });
      cy.fit(50);
    } else {
      applyColaLayout();
    }
  }

  function applyColaLayout() {
    if (!cy) return;
    try {
      cy.layout({
        name: 'cola',
        animate: true,
        animationDuration: 400,
        nodeSpacing: 60,
        edgeLength: 120,
        avoidOverlap: true,
        handleDisconnected: true,
        padding: 50,
        nodeDimensionsIncludeLabels: true,
        maxSimulationTime: 6000,
        fit: true
      }).run();
      setTimeout(saveLayoutToStorage, 500);
    } catch (e) {
      cy.layout({
        name: 'cose',
        animate: true,
        nodeRepulsion: 800000,
        idealEdgeLength: 120,
        edgeElasticity: 120,
        nestingFactor: 1.2,
        padding: 50,
        fit: true
      }).run();
      setTimeout(saveLayoutToStorage, 500);
    }
  }

  function exportBackup(includeToken) {
    const baseUrl = getBaseUrl();
    const layout2 = readStoredLayoutRaw(STORAGE_LAYOUT_2D);
    const layout3 = readStoredLayoutRaw(STORAGE_LAYOUT_3D);
    const data = {
      version: 2,
      baseUrl: baseUrl || undefined,
      layout_2d: layout2 && Object.keys(layout2).length ? layout2 : undefined,
      layout_3d: layout3 && Object.keys(layout3).length ? layout3 : undefined,
      layout: layout2 && Object.keys(layout2).length ? layout2 : undefined,
      token: includeToken ? getToken() || undefined : undefined
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ha-graph-backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importBackup(file) {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (data.baseUrl != null) setBaseUrl(String(data.baseUrl).replace(/\/$/, ''));
        if (data.layout_2d != null) localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(data.layout_2d));
        if (data.layout_3d != null) localStorage.setItem(STORAGE_LAYOUT_3D, JSON.stringify(data.layout_3d));
        if (data.layout != null && !data.layout_2d) localStorage.setItem(STORAGE_LAYOUT_2D, JSON.stringify(layoutTo2d(data.layout)));
        if (data.layout != null && !data.layout_3d) localStorage.setItem(STORAGE_LAYOUT_3D, JSON.stringify(data.layout));
        if (data.token != null) setToken(data.token);
        document.getElementById('base-url-input').value = data.baseUrl != null ? data.baseUrl : getBaseUrl();
        if (data.token) document.getElementById('token-input').value = '';
        try {
          await pushServerConfig({
            token: getToken() || undefined,
            base_url: getBaseUrl() || undefined,
            layout_2d: readStoredLayoutRaw(STORAGE_LAYOUT_2D) || undefined,
            layout_3d: readStoredLayoutRaw(STORAGE_LAYOUT_3D) || undefined
          });
        } catch (e) { /* optional */ }
        location.reload();
      } catch (e) {
        alert(t('invalid_backup'));
      }
    };
    reader.readAsText(file);
  }

  async function initAuthPanel() {
    updateServerSyncPill('checking');
    const baseInput = document.getElementById('base-url-input');
    const storedBase = localStorage.getItem(STORAGE_BASE);
    if (storedBase) baseInput.value = storedBase;
    await syncFromServer();
    ensureLayoutsMigratedFromLegacy();
    if (!baseInput.value.trim()) baseInput.value = getBaseUrl();
    if (getToken()) {
      showAuth(false);
      wsConnect();
    } else {
      showAuth(true);
    }
    await refreshServerSyncIndicator();
  }
  document.getElementById('auth-save').onclick = async () => {
    const base = document.getElementById('base-url-input').value.trim();
    const token = document.getElementById('token-input').value.trim();
    if (base) setBaseUrl(base.replace(/\/$/, ''));
    if (token) setToken(token);
    document.getElementById('token-input').value = '';
    try {
      const authPatch = {
        token: getToken() || undefined,
        base_url: getBaseUrl() || undefined
      };
      const l2 = readStoredLayoutRaw(STORAGE_LAYOUT_2D);
      const l3 = readStoredLayoutRaw(STORAGE_LAYOUT_3D);
      if (l2 && Object.keys(l2).length) authPatch.layout_2d = l2;
      if (l3 && Object.keys(l3).length) authPatch.layout_3d = l3;
      await pushServerConfig(authPatch);
    } catch (e) { /* integration not installed or save failed */ }
    showAuth(false);
    if (ws) ws.close();
    wsConnect();
    refreshServerSyncIndicator();
  };
  document.getElementById('auth-close').onclick = () => showAuth(false);
  document.getElementById('btn-backup').onclick = () => showAuth(true);
  document.getElementById('btn-export-backup').onclick = () => {
    const includeToken = document.getElementById('export-include-token').checked;
    exportBackup(includeToken);
  };
  document.getElementById('btn-import-backup').onclick = () => document.getElementById('import-backup-file').click();
  document.getElementById('import-backup-file').onchange = (e) => {
    const f = e.target.files[0];
    if (f) importBackup(f);
    e.target.value = '';
  };
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      if (lang && (lang === 'en' || lang === 'fr')) {
        localStorage.setItem(STORAGE_LANG, lang);
        location.reload();
      }
    });
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refreshServerSyncIndicator();
  });
  applyI18n();
  (async () => {
    await initAuthPanel();
  })();
})();
  </script>
